    else if (selR && !rifles.find(r=>r.id===selR)) setSelR(rifles.length?rifles[0].id:"");
    if (!selA && ammo.length === 1) setSelA(ammo[0].id);
    else if (selA && !ammo.find(a=>a.id===selA)) setSelA(ammo.length?ammo[0].id:"");
  }, [rifles, ammo]);

  const rifle = rifles.find(r=>r.id===selR);
  const am = ammo.find(a=>a.id===selA);
  const pk = selR&&selA?`${selR}_${selA}`:null;
  const pd = pk?(truingData[pk]||{points:[]}):({points:[]});
  const tc = rifle?parseFloat(rifle.trackingCorrection)||1:1;
  const da = tDa!==""&&!isNaN(parseFloat(tDa))?parseFloat(tDa):0;

  // Tall target
  const ttDistN = parseFloat(ttDist)||100;
  const ttDialN = parseFloat(ttDialed)||0;
  const ttExpIn = ttDialUnit==="MOA"?(ttDialN/95.5)*ttDistN:ttDialN*ttDistN*0.036;
  const ttMeasN = parseFloat(ttMeas)||0;
  const ttMeasIn = ttMeasUnit==="IN"?ttMeasN:ttMeasUnit==="MIL"?ttMeasN*ttDistN*0.036:(ttMeasN/95.5)*ttDistN;
  const ttFact = ttMeasIn>0?ttMeasIn/ttExpIn:null;
  const ttPct = ttFact?(ttFact*100):null;
  const ttClr = ttPct?(ttPct>=98&&ttPct<=102?C.green:ttPct>=95&&ttPct<=105?C.yellow:C.red):C.dim;
  const saveTT = () => { if(!rifle||!ttFact) return; setRifles(rifles.map(r=>r.id===selR?{...r,trackingCorrection:ttFact.toFixed(4)}:r)); setTtMsg(`Tracking ${(ttFact*100).toFixed(1)}% saved`); setTimeout(()=>setTtMsg(""),3000); };

  const updateTruing = (fn) => {
    setTruingData(prev => {
      const prevPd = pk ? (prev[pk] || { points: [] }) : { points: [] };
      return { ...prev, [pk]: fn(prevPd) };
    });
  };

  const [ptWarning, setPtWarning] = useState(null); // {msg, pt} — pending point awaiting confirmation

  const validatePoint = (dist, corrMils, solved, mvUse) => {
    const warnings = [];
    // 1. Solved BC clamped
    if (solved.clamped === "high") warnings.push("BC hit upper limit 0.5 — dial-up too low for this distance");
    if (solved.clamped === "low") warnings.push("BC hit lower limit 0.01 — dial-up too high for this distance");
    if (solved.clamped === "negative") warnings.push("Negative BC — impossible, check your dial-up sign");
    // 2. Factor way outside normal range (expect 0.2–0.8 for TM22)
    const baseBcN = parseFloat(am.baseBc);
    if (baseBcN > 0) {
      const factor = solved.bc / baseBcN;
      if (factor > 1.0) warnings.push(`Factor ×${factor.toFixed(2)} — BC higher than base profile, very unusual`);
      if (factor < 0.15) warnings.push(`Factor ×${factor.toFixed(2)} — extremely low BC, likely a misread`);
    }
    // 3. If we have existing single BC, check against prediction
    const existingPts = pd.points.filter(p => p.corrMils > 0 && p.distance > 0);
    if (existingPts.length >= 3) {
      const sbr = solveSingleTM22Bc(existingPts);
      if (sbr) {
        const tempUse = (tMV && am && Math.abs(parseFloat(tMV) - parseFloat(am.muzzleVelocity)) > 3) ? 59 : parseFloat(tTemp);
        const pred = calculateDrop({distance: dist, muzzleVelocity: mvUse, bc: sbr.bc, zeroRange: parseFloat(rifle.zeroDistance), scopeHeight: parseFloat(rifle.scopeHeight), temperature: tempUse, densityAltitude: da}, TM22_TABLE);
        const delta = Math.abs(corrMils - pred.dropMils);
        if (delta > 0.5) warnings.push(`Off by ${delta.toFixed(2)} MIL from current BC ${sbr.bc.toFixed(4)} prediction (${pred.dropMils.toFixed(2)} expected) — possible misread or wrong distance`);
        else if (delta > 0.3) warnings.push(`${delta.toFixed(2)} MIL from expected ${pred.dropMils.toFixed(2)} — check your reading`);
      }
    }
    // 4. Dial-up sanity vs distance
    if (dist > 100 && corrMils < 1.0) warnings.push("Dial-up very low for this distance — did you read the right target?");
    if (dist < 100 && corrMils > 5.0) warnings.push("Dial-up very high for this distance — check units");
    if (dist > 250 && corrMils < 5.0) warnings.push("Dial-up suspiciously low beyond 250yd");
    return warnings;
  };

  const addPt = () => {
    setErr("");setPtWarning(null);
    if(!rifle||!am){setErr("Select rifle and ammo");return;}
    if(!nDist||!nDial){setErr("Enter distance and dial-up");return;}
    try{
      const dist=parseFloat(nDist), rawDial=parseFloat(nDial);
      if(isNaN(dist)||isNaN(rawDial)||dist<=0){setErr("Invalid values");return;}
      if(rawDial<=0){setErr("Dial-up must be positive — negative means bullet hit above aim point");return;}
      const zeroD = parseFloat(rifle.zeroDistance) || 50;
      let lowConf = dist < zeroD * 2.5;
      const dialMils = nDialUnit==="MOA"?rawDial*0.2909:nDialUnit==="IN"?(rawDial/(dist*36))*1000:rawDial;
      const corrMils = dialMils / tc;
      const mvUse = tMV?parseFloat(tMV):parseFloat(am.muzzleVelocity);
      const solved = solveBcFromDialUp(corrMils,dist,parseFloat(rifle.zeroDistance),parseFloat(rifle.scopeHeight),mvUse,parseFloat(tTemp),da, TM22_TABLE);
      if (solved.clamped) { lowConf = true; }
      // Validate
      const warnings = validatePoint(dist, corrMils, solved, mvUse);
      const vel = calcVelocityAtDist(dist,mvUse,solved.bc, TM22_TABLE, parseFloat(tTemp), da);
      const localSos = STD_SPEED_OF_SOUND * Math.sqrt((parseFloat(tTemp) + 459.67) / 518.67);
      const baseBcN = parseFloat(am.baseBc);
      const factor = baseBcN > 0 ? solved.bc / baseBcN : 1;
      const pt = {
        id: editPt || Date.now().toString(),
        timestamp: new Date().toISOString(),
        distance: dist, rawDial, dialUnit: nDialUnit, dialMils, corrMils,
        bc: solved.bc, factor, lowConf,
        velocity: vel, mach: vel / localSos,
        shots: parseInt(nShots) || 10, grpSize: parseFloat(nGrp) || 0, grpUnit: nGrpUnit,
        conditions: { temp: parseFloat(tTemp), da, mv: mvUse, profileMV: parseFloat(am.muzzleVelocity), trackingCorr: tc, zeroDistance: parseFloat(rifle.zeroDistance), scopeHeight: parseFloat(rifle.scopeHeight), bcModel: "TM22", baseBc: parseFloat(am.baseBc) }
      };
      if (warnings.length > 0) {
        setPtWarning({ msgs: warnings, pt });
        return; // Don't save yet — user must confirm
      }
      commitPoint(pt);
    }catch(e){setErr("Solve failed: "+e.message);}
  };

  const commitPoint = (pt) => {
    updateTruing(prevPd => {
      const pts = editPt ? prevPd.points.filter(x => x.id !== editPt) : prevPd.points;
      return { ...prevPd, points: [...pts, pt].sort((a, b) => a.distance - b.distance) };
    });
    setNDist("");setNDial("");setNShots("10");setNGrp("1.5");setEditPt(null);setPtWarning(null);
  };

  const deletePt = (pid) => updateTruing(prevPd => ({ ...prevPd, points: prevPd.points.filter(x => x.id !== pid) }));
  const [confirmClear, setConfirmClear] = useState(false);
  const clearAll = () => { if(!confirmClear){ setConfirmClear(true); setTimeout(()=>setConfirmClear(false),3000); return; } updateTruing(()=>({points:[]})); setConfirmClear(false); };

  const saveCollection = () => {
    setErr("");
    if(!rifle||!am){setErr("Select rifle and ammo");return;}
    const sessionId = Date.now().toString();
    const mvUse = tMV?parseFloat(tMV):parseFloat(am.muzzleVelocity);
    const zeroD = parseFloat(rifle.zeroDistance)||50;
    const localSos = STD_SPEED_OF_SOUND * Math.sqrt((parseFloat(tTemp) + 459.67) / 518.67);
    const baseBcN = parseFloat(am.baseBc);
    const newPts = [];
    const skipped = [];
    // Get existing single BC for prediction check
    const existingPts = pd.points.filter(p => p.corrMils > 0 && p.distance > 0);
    const sbr = existingPts.length >= 3 ? solveSingleTM22Bc(existingPts) : null;
    for(const row of collRows){
      if(!row.dial||isNaN(parseFloat(row.dial))) continue;
      const dist = row.dist, rawDial = parseFloat(row.dial);
      if(rawDial<=0) { skipped.push(`${dist}yd: negative dial-up`); continue; }
      const dialMils = nDialUnit==="MOA"?rawDial*0.2909:rawDial;
      const corrMils = dialMils / tc;
      try{
        const solved = solveBcFromDialUp(corrMils,dist,parseFloat(rifle.zeroDistance),parseFloat(rifle.scopeHeight),mvUse,parseFloat(tTemp),da, TM22_TABLE);
        // Skip hard garbage: clamped BC
        if (solved.clamped === "high" || solved.clamped === "negative") {
          skipped.push(`${dist}yd: BC clamped (${rawDial} ${nDialUnit} too ${solved.clamped==="high"?"low":"high"})`);
          continue;
        }
        // Skip if factor is absurd (>2.0 = definitely garbage)
        const factor = baseBcN > 0 ? (solved.bc||baseBcN) / baseBcN : 1;
        if (factor > 2.0) {
          skipped.push(`${dist}yd: factor ×${factor.toFixed(1)} — impossible, skipped`);
          continue;
        }
        // Warn (but keep) if >0.5 MIL from prediction
        let warn = false;
        if (sbr) {
          const tempUse = (tMV && Math.abs(parseFloat(tMV) - parseFloat(am.muzzleVelocity)) > 3) ? 59 : parseFloat(tTemp);
          const pred = calculateDrop({distance:dist, muzzleVelocity:mvUse, bc:sbr.bc, zeroRange:parseFloat(rifle.zeroDistance), scopeHeight:parseFloat(rifle.scopeHeight), temperature:tempUse, densityAltitude:da}, TM22_TABLE);
          if (Math.abs(corrMils - pred.dropMils) > 0.5) warn = true;
        }
        const vel = calcVelocityAtDist(dist,mvUse,solved.bc||baseBcN, TM22_TABLE, parseFloat(tTemp), da);
        newPts.push({
          id: sessionId+"_"+dist, timestamp: new Date().toISOString(), sessionId,
          distance: dist, rawDial, dialUnit: nDialUnit, dialMils, corrMils,
          bc: solved.bc||(solved.clamped?baseBcN:baseBcN), factor,
          lowConf: dist < zeroD * 2.5 || !!solved.clamped || warn,
          velocity: vel, mach: vel / localSos,
          shots: parseInt(row.shots)||10, grpSize: parseFloat(row.grp)||0, grpUnit: row.grpUnit||"MOA",
          conditions: { temp: parseFloat(tTemp), da, mv: mvUse, profileMV: parseFloat(am.muzzleVelocity), trackingCorr: tc, zeroDistance: parseFloat(rifle.zeroDistance), scopeHeight: parseFloat(rifle.scopeHeight), bcModel: "TM22", baseBc: baseBcN },
          collectionNote: collNote
        });
      }catch(e){}
    }
    if(newPts.length===0&&skipped.length===0){setErr("No valid dial-ups entered");return;}
    if(newPts.length===0&&skipped.length>0){setErr("All points rejected: "+skipped.join("; "));return;}
    updateTruing(prevPd => ({ ...prevPd, points: [...prevPd.points, ...newPts].sort((a,b)=>a.distance-b.distance) }));
    const msg = skipped.length > 0 ? `Saved ${newPts.length} pts. Skipped ${skipped.length}: ${skipped.join("; ")}` : "";
    setCollRows(defaultLadder.map(d=>({dist:d,dial:"",shots:"10",grp:"",grpUnit:"MOA"})));
    setCollNote(""); setErr(msg);
  };

  const Sel = ({label,value,onChange,items,fmt}) => (
    <div style={{flex:1}}><label style={sLabel}>{label}</label>
      <select style={sInput} value={value} onChange={e=>onChange(e.target.value)}><option value="">Select...</option>{items.map(i=><option key={i.id} value={i.id}>{fmt(i)}</option>)}</select>
    </div>
  );

  const baseBcN = am ? parseFloat(am.baseBc) : 0.135;

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <Sel label="Rifle" value={selR} onChange={setSelR} items={rifles} fmt={r=>r.name} />
        <Sel label="Ammo" value={selA} onChange={setSelA} items={ammo} fmt={a=>a.profileName||`${a.manufacturer} ${a.name}`} />
      </div>
      {!selR||!selA?(
        <div style={{...sCard,textAlign:"center",color:C.dim,padding:30}}>Select rifle and ammo to begin truing</div>
      ):(
        <>
          {/* Scope tracking */}
          <details style={{marginBottom:10}} open={tc===1}>
            <summary style={{color:C.text,fontSize:14,fontWeight:600,cursor:"pointer",padding:"8px 0"}}>
              Scope Tracking {tc!==1?<span style={{color:tc>=0.98&&tc<=1.02?C.green:C.yellow,fontSize:11,marginLeft:8}}>({(tc*100).toFixed(1)}%)</span>:<span style={{color:C.red,fontSize:11,marginLeft:8}}>(NOT TESTED)</span>}
            </summary>
            <div style={sCard}>
              <div style={{color:C.dim,fontSize:11,lineHeight:1.5,marginBottom:10,background:C.bg,borderRadius:6,padding:8}}>
                <span style={{color:C.text,fontWeight:600}}>Tall Target Test:</span> At a measured distance, dial a known amount on your turret and shoot. Measure the actual bullet displacement. If your scope tracks 100%, the measured displacement equals the expected displacement.<br/>
                <span style={{color:C.yellow,fontWeight:600}}>Example:</span> At 100yd, dial 10 MIL up = expect 36.0". If bullet hits 34.5" high, tracking = 95.8%. The app corrects all dial-ups by this factor.
              </div>
              <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
                <InputRow label="Test Dist (yd)" value={ttDist} onChange={setTtDist} inputMode="numeric" />
                <InputRow label="Dialed" value={ttDialed} onChange={setTtDialed} inputMode="decimal" />
                <UnitPicker value={ttDialUnit} onChange={setTtDialUnit} options={["MIL","MOA"]} />
              </div>
              {ttDialN>0 && <div style={{color:C.dim,fontSize:11,marginBottom:6}}>Expected displacement: <span style={{color:C.text,fontWeight:600}}>{ttExpIn.toFixed(1)}"</span> at {ttDistN}yd</div>}
              <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
                <InputRow label="Actual Measured" value={ttMeas} onChange={setTtMeas} placeholder="—" inputMode="decimal" />
                <UnitPicker value={ttMeasUnit} onChange={setTtMeasUnit} options={["IN","MIL","MOA"]} />
              </div>
              {ttPct&&<div style={{background:C.bg,borderRadius:6,padding:10,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:ttClr,fontSize:18,fontWeight:700}}>Tracking: {ttPct.toFixed(1)}%</span>
                  <span style={{color:C.dim,fontSize:11}}>Factor: {ttFact.toFixed(4)}</span>
                </div>
                <div style={{color:C.dim,fontSize:11,marginTop:4}}>
                  {ttPct>=98&&ttPct<=102?<span style={{color:C.green}}>✓ Excellent — within ±2%</span>:
                   ttPct>=95&&ttPct<=105?<span style={{color:C.yellow}}>⚠ Acceptable — correction applied to all dial-ups</span>:
                   <span style={{color:C.red}}>✗ Poor — recheck mount torque, ring alignment, or scope quality</span>}
                </div>
              </div>}
              <div style={{display:"flex",gap:6}}>
                <button style={sBtnSm} onClick={saveTT} disabled={!ttMeas}>Save to Rifle Profile</button>
                <button style={{...sBtnSm,background:C.border}} onClick={()=>{setRifles(rifles.map(r=>r.id===selR?{...r,trackingCorrection:"1.000"}:r));setTtMeas("")}}>Reset 1.000</button>
              </div>
              {ttMsg&&<div style={{color:C.green,fontSize:12,marginTop:6}}>{ttMsg}</div>}
            </div>
          </details>

          {/* Session conditions */}
          <div style={sCard}>
            <div style={{color:C.dim,fontSize:11,fontWeight:600,marginBottom:6}}>SESSION CONDITIONS</div>
            <div style={{display:"flex",gap:8,marginBottom:4}}>
              <div style={{flex:1}}>
                <label style={sLabel}>Chrono MV (fps)</label>
                <input style={{...sInput, borderColor: tMV ? C.green : C.border}} inputMode="decimal" value={tMV} onChange={e=>setTMV(e.target.value)} placeholder={am?am.muzzleVelocity:"—"} />
              </div>
              <div style={{flex:1}}><label style={sLabel}>Temp (°F)</label><input style={sInput} inputMode="decimal" value={tTemp} onChange={e=>setTTemp(e.target.value)} /></div>
              <div style={{flex:1}}><label style={sLabel}>DA (ft)</label><input style={sInput} inputMode="numeric" value={tDa} onChange={e=>setTDa(e.target.value)} /></div>
            </div>
            <div style={{fontSize:10,marginTop:4,lineHeight:1.6}}>
              {tMV ? (
                <span style={{color:C.green}}>✓ CHRONO: Using {tMV} fps as-is — no temp adjustment</span>
              ) : (
                <span style={{color:C.yellow}}>⚠ NO CHRONO: Using profile {am?.muzzleVelocity||"—"} fps + temp adj ({((parseFloat(tTemp)-59)*0.8).toFixed(1)} fps). Enter chrono'd MV for best accuracy.</span>
              )}
            </div>
          </div>

          {/* Mode toggle */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{color:C.text,fontSize:15,fontWeight:600}}>Truing Points</div>
            <button style={{...sBtnSm,background:collMode?C.accent:C.border,fontSize:10}} onClick={()=>setCollMode(!collMode)}>{collMode?"Single Point":"Collection Mode"}</button>
          </div>

          {collMode?(
            <div style={sCard}>
              <div style={{color:C.dim,fontSize:11,fontWeight:600,marginBottom:6}}>COLLECTION — Dial-Up Ladder</div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1}}><label style={sLabel}>Dial Unit</label>
                  <select style={sInput} value={nDialUnit} onChange={e=>setNDialUnit(e.target.value)}><option value="MIL">MIL</option><option value="MOA">MOA</option></select>
                </div>
                <div style={{flex:2}}><label style={sLabel}>Session Note</label>
                  <input style={sInput} value={collNote} onChange={e=>setCollNote(e.target.value)} placeholder="e.g. Session 4, cold barrel" />
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"55px 1fr 50px 60px 24px",gap:4,fontSize:12,marginBottom:4}}>
                <span style={{color:C.dim,fontWeight:600,padding:"0 2px"}}>Dist</span>
                <span style={{color:C.dim,fontWeight:600,padding:"0 2px"}}>Dial ({nDialUnit})</span>
                <span style={{color:C.dim,fontWeight:600,padding:"0 2px"}}>Rds</span>
                <span style={{color:C.dim,fontWeight:600,padding:"0 2px"}}>Grp</span>
                <span></span>
                {collRows.map((r,i)=>{
                  const zeroD = parseFloat(rifle?.zeroDistance)||50;
                  const conf = getConfZone(r.dist, zeroD);
                  return (
                    <React.Fragment key={i}>
                      <span style={{color:conf.color,fontWeight:600,padding:"8px 2px",fontSize:13}}>{r.dist}</span>
                      <input style={{...sInput,padding:"6px 8px",fontSize:13}} inputMode="decimal" value={r.dial} placeholder="—" onChange={e=>{const nr=[...collRows];nr[i]={...nr[i],dial:e.target.value};setCollRows(nr)}} />
                      <input style={{...sInput,padding:"6px 4px",fontSize:12}} inputMode="numeric" value={r.shots} onChange={e=>{const nr=[...collRows];nr[i]={...nr[i],shots:e.target.value};setCollRows(nr)}} />
                      <input style={{...sInput,padding:"6px 4px",fontSize:12}} inputMode="decimal" value={r.grp} placeholder="—" onChange={e=>{const nr=[...collRows];nr[i]={...nr[i],grp:e.target.value};setCollRows(nr)}} />
                      <button style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:14,padding:0}} onClick={()=>setCollRows(collRows.filter((_,j)=>j!==i))}>×</button>
                    </React.Fragment>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
                <input style={{...sInput,width:55,padding:"4px 6px",fontSize:12}} inputMode="numeric" placeholder="yd" id="addDistInput" />
                <button style={{...sBtnSm,background:C.border,fontSize:10}} onClick={()=>{
                  const inp=document.getElementById("addDistInput");
                  const d=parseInt(inp?.value);
                  if(d>0&&!collRows.find(r=>r.dist===d)){
                    setCollRows([...collRows,{dist:d,dial:"",shots:"10",grp:"",grpUnit:"MOA"}].sort((a,b)=>a.dist-b.dist));
                    if(inp) inp.value="";
                  }
                }}>+ Add Distance</button>
              </div>
              {err&&<div style={{color:C.red,fontSize:12,marginBottom:6}}>{err}</div>}
              <button style={sBtn} onClick={saveCollection}>Save {collRows.filter(r=>r.dial).length} Points</button>
            </div>
          ):(
            <div style={sCard}>
              <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
                <InputRow label="Distance (yd)" value={nDist} onChange={setNDist} placeholder="200" inputMode="numeric" />
                <InputRow label="Dial-Up" value={nDial} onChange={setNDial} placeholder="1.70" inputMode="decimal" />
                <UnitPicker value={nDialUnit} onChange={setNDialUnit} options={["MIL","MOA","IN"]} />
              </div>
              <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
                <InputRow label="Shots" value={nShots} onChange={setNShots} inputMode="numeric" />
                <InputRow label="Group Size" value={nGrp} onChange={setNGrp} inputMode="decimal" />
                <UnitPicker value={nGrpUnit} onChange={setNGrpUnit} options={["MOA","MIL","IN"]} />
              </div>
              {err&&<div style={{color:C.red,fontSize:12,marginBottom:6}}>{err}</div>}
              <div style={{display:"flex",gap:6}}>
                <button style={sBtn} onClick={addPt}>{editPt?"Update Point":"+ Add Point"}</button>
                {editPt&&<button style={{...sBtnSm,background:C.border}} onClick={()=>{setEditPt(null);setNDist("");setNDial("")}}>Cancel</button>}
              </div>
              {/* Validation warning gate */}
              {ptWarning && (
                <div style={{background:"#3d1f00",border:`2px solid ${C.yellow}`,borderRadius:6,padding:10,marginTop:8}}>
                  <div style={{color:C.yellow,fontSize:12,fontWeight:700,marginBottom:6}}>⚠ CHECK YOUR DATA</div>
                  {ptWarning.msgs.map((m,i) => <div key={i} style={{color:C.text,fontSize:11,marginBottom:4}}>• {m}</div>)}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <button style={{...sBtn,background:C.yellow,color:"#000",flex:1}} onClick={()=>commitPoint(ptWarning.pt)}>Save Anyway</button>
                    <button style={{...sBtn,background:C.border,flex:1}} onClick={()=>setPtWarning(null)}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Points display */}
          {pd.points.length>0&&(
            <div style={sCard}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{color:C.dim,fontSize:11,fontWeight:600}}>TRUING DATA — {pd.points.length} pts</span>
                <button style={{...sBtnSm,background:confirmClear?C.red:C.border,padding:"4px 8px",fontSize:10}} onClick={clearAll}>{confirmClear?"TAP AGAIN":"Clear All"}</button>
              </div>
              {pd.points.map(p=>{
                const conf = getConfZone(p.distance, parseFloat(rifle?.zeroDistance)||50);
                return (
                  <div key={p.id} style={{background:C.bg,borderRadius:6,padding:8,marginBottom:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                        <span style={{color:C.text,fontWeight:700,fontSize:14}}>{p.distance}yd</span>
                        <span style={{color:conf.color,fontWeight:600,fontSize:12}}>BC {p.bc.toFixed(4)}</span>
                        <span style={{color:C.dim,fontSize:11}}>×{(p.factor||1).toFixed(3)}</span>
                        {p.lowConf&&<span style={{color:C.yellow,fontSize:9,background:C.border,borderRadius:3,padding:"1px 4px"}}>LOW</span>}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <span style={{color:C.accent,cursor:"pointer",fontSize:10}} onClick={()=>{setEditPt(p.id);setNDist(p.distance.toString());setNDial(p.rawDial.toString());setNDialUnit(p.dialUnit||"MIL");setCollMode(false)}}>✎</span>
                        <span style={{color:C.red,cursor:"pointer",fontSize:12}} onClick={()=>deletePt(p.id)}>✕</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,fontSize:10,color:C.dim,marginTop:2}}>
                      <span>{p.rawDial}{p.dialUnit}</span>
                      <span>{Math.round(p.velocity)}fps</span>
                      <span>M{p.mach.toFixed(2)}</span>
                      {p.conditions?.temp&&<span>{p.conditions.temp}°F</span>}
                      {p.conditions?.da!==undefined&&<span>DA{p.conditions.da}</span>}
                    </div>
                  </div>
                );
              })}
              {/* Single TM22 BC solver result */}
              {pd.points.length>=2&&(()=>{
                const sbr = solveSingleTM22Bc(pd.points);
                if(!sbr) return null;
                return (
                  <div style={{background:"#0c2d1a",border:`1px solid ${C.green}`,borderRadius:6,padding:10,marginTop:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{color:C.green,fontSize:12,fontWeight:700}}>SINGLE TM22 BC</span>
                      <span style={{color:C.text,fontSize:18,fontWeight:700}}>{sbr.bc.toFixed(4)}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.dim}}>
                      <span>{sbr.numPoints} points across {new Set(pd.points.map(p=>(p.conditions?.da||0).toString())).size} sessions</span>
                      <span>avg ±{sbr.avgError.toFixed(2)} max ±{sbr.maxError.toFixed(2)} MIL</span>
                    </div>
                    {sbr.residuals&&sbr.residuals.length>0&&(
                      <div style={{marginTop:6,fontSize:10}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:2,color:C.dim}}>
                          <span style={{fontWeight:600}}>Dist</span><span style={{fontWeight:600,textAlign:"right"}}>Actual</span><span style={{fontWeight:600,textAlign:"right"}}>Pred</span><span style={{fontWeight:600,textAlign:"right"}}>Error</span>
                          {sbr.residuals.map((r,i)=>(
                            <React.Fragment key={i}>
                              <span style={{color:C.text}}>{r.dist}yd</span>
                              <span style={{textAlign:"right"}}>{r.actual.toFixed(2)}</span>
                              <span style={{textAlign:"right"}}>{r.predicted.toFixed(2)}</span>
                              <span style={{textAlign:"right",color:Math.abs(r.error)<0.1?C.green:Math.abs(r.error)<0.2?C.yellow:C.red}}>{(r.error>=0?"+":"")+r.error.toFixed(2)}</span>
                            </React.Fragment>
                          ))}
                        </div>
                        <div style={{marginTop:6,padding:"6px 8px",background:"rgba(0,0,0,0.3)",borderRadius:4,lineHeight:1.8}}>
                          <div style={{color:C.dim,fontSize:9,fontWeight:600,marginBottom:2}}>LEGEND</div>
                          <span style={{color:C.green,fontSize:9}}>■</span><span style={{color:C.dim,fontSize:9}}> Error &lt;0.1 MIL — excellent </span>
                          <span style={{color:C.yellow,fontSize:9}}>■</span><span style={{color:C.dim,fontSize:9}}> 0.1–0.2 MIL — acceptable </span>
                          <span style={{color:C.red,fontSize:9}}>■</span><span style={{color:C.dim,fontSize:9}}> &gt;0.2 MIL — check data</span><br/>
                          <span style={{color:C.dim,fontSize:9}}>+ = predicted higher than actual (app over-predicts drop, dial less) </span><br/>
                          <span style={{color:C.dim,fontSize:9}}>− = predicted lower than actual (app under-predicts drop, dial more)</span><br/>
                          <span style={{color:C.dim,fontSize:9}}>BC = single value scaling the TM22 drag curve to fit all your field data</span><br/>
                          <span style={{color:C.dim,fontSize:9}}>Sessions = unique conditions (temp/DA combos) detected in your data</span>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}
              {/* TM22 curve display */}
              {pd.points.length>=2&&(()=>{
                const tbl = buildTM22Display(pd.points, baseBcN);
                if(!tbl||tbl.length<2) return null;
                const maxW = Math.max(...tbl.map(e=>e.weight));
                return (
                  <div style={{background:C.bg,borderRadius:6,padding:8,marginTop:8}}>
                    <div style={{color:C.accent,fontSize:11,fontWeight:600,marginBottom:6}}>TM22 FACTOR CURVE — {tbl.length} zones</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:2,fontSize:11}}>
                      <span style={{color:C.dim,fontWeight:600}}>Mach</span>
                      <span style={{color:C.dim,fontWeight:600,textAlign:"right"}}>Factor</span>
                      <span style={{color:C.dim,fontWeight:600,textAlign:"right"}}>Eff BC</span>
                      <span style={{color:C.dim,fontWeight:600,textAlign:"right"}}>Conf</span>
                      {tbl.map((e,i)=>{
                        const confPct = maxW > 0 ? Math.min((e.weight/maxW)*100, 100) : 50;
                        const confClr = e.lowConf ? C.yellow : confPct > 60 ? C.green : confPct > 30 ? C.yellow : C.red;
                        return (
                          <React.Fragment key={i}>
                            <span style={{color:C.text}}>{e.mach.toFixed(3)}</span>
                            <span style={{color:Math.abs(e.factor-1)>0.15?C.yellow:C.green,textAlign:"right"}}>×{e.factor.toFixed(3)}</span>
                            <span style={{color:C.dim,textAlign:"right"}}>{(baseBcN*e.factor).toFixed(4)}</span>
                            <span style={{color:confClr,textAlign:"right"}}>{e.count>1?`${e.count}× `:""}{e.lowConf?"⚠":"●"}</span>
                          </React.Fragment>
                        );
                      })}
                    </div>
                    <div style={{color:C.dim,fontSize:10,marginTop:4}}>Base BC {baseBcN} TM22 · ×1.0 = perfect match to reference curve</div>
                    <div style={{marginTop:6,padding:"6px 8px",background:"rgba(0,0,0,0.3)",borderRadius:4,lineHeight:1.8}}>
                      <div style={{color:C.dim,fontSize:9,fontWeight:600,marginBottom:2}}>LEGEND</div>
                      <span style={{color:C.dim,fontSize:9}}><span style={{fontWeight:600}}>Mach</span> — bullet speed ÷ speed of sound at that point in flight</span><br/>
                      <span style={{color:C.dim,fontSize:9}}><span style={{fontWeight:600}}>Factor</span> — how much the real drag differs from the reference curve at this Mach</span><br/>
                      <span style={{color:C.dim,fontSize:9}}>&nbsp;&nbsp;</span><span style={{color:C.green,fontSize:9}}>×0.3–0.5</span><span style={{color:C.dim,fontSize:9}}> = normal for single BC fit &nbsp;</span>
                      <span style={{color:C.yellow,fontSize:9}}>×&lt;0.2 or &gt;0.8</span><span style={{color:C.dim,fontSize:9}}> = unusual</span><br/>
                      <span style={{color:C.dim,fontSize:9}}><span style={{fontWeight:600}}>Eff BC</span> — effective BC at this Mach (base BC × factor)</span><br/>
                      <span style={{color:C.dim,fontSize:9}}><span style={{fontWeight:600}}>Conf</span> — confidence from data density at this Mach zone:</span><br/>
                      <span style={{color:C.dim,fontSize:9}}>&nbsp;&nbsp;</span><span style={{color:C.green,fontSize:9}}>●</span><span style={{color:C.dim,fontSize:9}}> high confidence (many data points) &nbsp;</span>
                      <span style={{color:C.yellow,fontSize:9}}>●</span><span style={{color:C.dim,fontSize:9}}> moderate &nbsp;</span>
                      <span style={{color:C.red,fontSize:9}}>●</span><span style={{color:C.dim,fontSize:9}}> low (few points)</span><br/>
                      <span style={{color:C.dim,fontSize:9}}>&nbsp;&nbsp;</span><span style={{color:C.yellow,fontSize:9}}>⚠</span><span style={{color:C.dim,fontSize:9}}> low-confidence zone (short range or clamped) — data is noisy here</span><br/>
                      <span style={{color:C.dim,fontSize:9}}>&nbsp;&nbsp;<span style={{fontWeight:600}}>3×</span> = 3 data points in this Mach zone</span>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ============================================================================
// HUD TAB — Match-day prediction display
// ============================================================================
function HudTab({ rifles, ammo, truingData, bleWeather, hudState, setHudState, windLog, setWindLog }) {
  const hs = hudState;
  const set = (k,v) => setHudState(prev=>({...prev,[k]:v}));
  const [showWindLog, setShowWindLog] = useState(false);
  const [wlActualDrift, setWlActualDrift] = useState("");
  const [wlDriftDir, setWlDriftDir] = useState("R");
  const [wlNote, setWlNote] = useState("");
  const [wlMsg, setWlMsg] = useState("");

  // Auto-populate from BLE weather when available
  useEffect(() => {
    if (bleWeather?.temp !== null && bleWeather?.temp !== undefined) {
      set("temp", bleWeather.temp.toFixed(1));
    }
    if (bleWeather?.pressure !== null && bleWeather?.pressure !== undefined) {
      // Compute DA from pressure and temp: DA = 145442.16 * (1 - (P/29.92126)^0.190255) adjusted for temp
      const pInHg = bleWeather.pressure;
      const tempF = bleWeather.temp || parseFloat(hs.temp) || 59;
      const tempR = tempF + 459.67;
      const stdTempR = 518.67;
      const pressRatio = pInHg / 29.92126;
      const da = 145442.16 * (1 - Math.pow(pressRatio * (stdTempR / tempR), 0.234969));
      set("da", Math.round(da).toString());
    }
  }, [bleWeather]);

  const rifle = rifles.find(r=>r.id===hs.rifleId);
  const am = ammo.find(a=>a.id===hs.ammoId);
  useEffect(()=>{if(!hs.rifleId&&rifles.length>0)set("rifleId",rifles[0].id);if(!hs.ammoId&&ammo.length>0)set("ammoId",ammo[0].id)},[rifles,ammo]);

  const daVal = hs.da!==""&&!isNaN(parseFloat(hs.da))?parseFloat(hs.da):0;
  const hasChrono = !!hs.mvOverride;
  const mv = hasChrono?parseFloat(hs.mvOverride):(am?parseFloat(am.muzzleVelocity):1050);
  const profileMV = am?parseFloat(am.muzzleVelocity):1050;
  const estimatedMV = profileMV + (parseFloat(hs.temp) - 59) * 0.8;
  const pk = hs.rifleId&&hs.ammoId?`${hs.rifleId}_${hs.ammoId}`:null;
  const st = pk&&truingData[pk]?.points?.length>0?truingData[pk].points:null;
  const baseBc = am?parseFloat(am.baseBc):0.135;
  const isTrued = !!st;
  const unit = rifle?.turretUnit||"MIL";
  const isMOA = unit==="MOA";
  const uLabel = isMOA?"MOA":"MIL";

  // Solve single TM22 BC from all truing data (memoized)
  const singleBcResult = useMemo(() => st ? solveSingleTM22Bc(st) : null, [st]);
  const solverBc = singleBcResult ? singleBcResult.bc : baseBc;
  const solverMode = singleBcResult ? "single" : "base";

  const solve = useCallback((dist)=>{
    if(!rifle||!am) return null;
    const bc = singleBcResult ? singleBcResult.bc : baseBc;
    const cdTable = TM22_TABLE;
    // If user chrono'd today, MV already reflects actual temp — pass temp=59 to disable temp compensation
    // If using profile MV, apply temp compensation normally
    const solveTemp = hasChrono ? 59 : parseFloat(hs.temp);
    return calculateDrop({distance:dist,muzzleVelocity:mv,bc,zeroRange:parseFloat(rifle.zeroDistance),scopeHeight:parseFloat(rifle.scopeHeight),temperature:solveTemp,densityAltitude:daVal}, cdTable);
  },[rifle,am,mv,daVal,hs.temp,singleBcResult,baseBc,hasChrono]);

  const rangeNum = parseInt(hs.range) || 0;
  const res = useMemo(()=>rangeNum>0?solve(rangeNum):null,[solve,rangeNum]);
  const elevRaw = res?(isMOA?res.dropMOA:res.dropMils):0;
  const elevAbs = Math.abs(elevRaw);
  const energy = res&&am?(parseFloat(am.bulletWeight)*res.velocity*res.velocity)/450437:0;
  const conf = getConfZone(rangeNum, parseFloat(rifle?.zeroDistance||50));

  // Wind
  const w1 = parseFloat(hs.wind1Speed)||0, w2 = parseFloat(hs.wind2Speed)||0;
  const isClock = hs.dirMode === "clock";
  const toDeg = (v) => isClock ? parseClock(v) * 30 : (parseFloat(v) || 0);
  const tBrg = toDeg(hs.targetBearing), wFrom = toDeg(hs.windFrom);
  const cAngle = ((wFrom-tBrg)%360+360)%360;
  const cFrac = Math.sin((cAngle*Math.PI)/180);
  const wCalc = (spd)=>{
    if(!res||spd<=0) return null;
    const cFps=spd*cFrac*1.467;
    const lag=res.tof-(rangeNum*3)/res.adjustedMV;
    const dIn=cFps*lag;
    return {dMils:(dIn/(rangeNum*36))*1000, dMOA:(dIn/rangeNum)*95.5};
  };
  const wd1=wCalc(w1), wd2=wCalc(w2);
  const wv1=wd1?(isMOA?wd1.dMOA:wd1.dMils):0, wv2=wd2?(isMOA?wd2.dMOA:wd2.dMils):0;
  const wDisp = wd2?(Math.abs(wv1)+Math.abs(wv2))/2:Math.abs(wv1);
  const wDir = (wv1||wv2)>=0?"R":"L";

  // Spin drift
  const spinDrift = useMemo(()=>{
    if(!res||!rifle) return null;
    const twist = parseFloat(rifle.twistRate) || 16;
    const twistDir = rifle.twistDir || "R";
    const bw = am ? parseFloat(am.bulletWeight) || 40 : 40;
    return calcSpinDriftAtDist(rangeNum, res.tof, twist, bw, twistDir);
  },[res, rifle, am, rangeNum]);

  // Total horizontal: spin drift + wind
  const spinMils = spinDrift ? (isMOA ? spinDrift.driftMOA : spinDrift.driftMils) : 0;
  const totalWindMils = wDisp + Math.abs(spinMils);
  const spinDir = spinDrift && spinMils >= 0 ? "R" : "L";

  const tMin=hs.tableMin||25, tMax=hs.tableMax||325, tStep=hs.tableStep||25;
  const rTable = useMemo(()=>{
    if(!rifle||!am) return [];
    const rows=[];
    for(let d=tMin;d<=tMax;d+=tStep){
      const r=solve(d);
      if(!r) continue;
      const elev = isMOA?r.dropMOA:r.dropMils;
      let wMin=0, wMax=0;
      if((w1>0||w2>0) && cFrac!==0){
        const calcW=(spd)=>{
          if(spd<=0) return 0;
          const cFps=spd*cFrac*1.467;
          const lag=r.tof-(d*3)/r.adjustedMV;
          const dIn=cFps*lag;
          return isMOA?(dIn/d)*95.5:(dIn/(d*36))*1000;
        };
        wMin=calcW(w1); wMax=calcW(w2);
      }
      // Spin drift for table
      let sd = 0;
      if(rifle){
        const twist = parseFloat(rifle.twistRate)||16;
        const twistDir = rifle.twistDir||"R";
        const bw = am?parseFloat(am.bulletWeight)||40:40;
        const sdr = calcSpinDriftAtDist(d, r.tof, twist, bw, twistDir);
        sd = isMOA?sdr.driftMOA:sdr.driftMils;
      }
      const z = getConfZone(d, parseFloat(rifle?.zeroDistance||50));
      rows.push({d, elev, wMin, wMax, sd, confColor: z.color});
    }
    return rows;
  },[solve,rifle,am,isMOA,tMin,tMax,tStep,w1,w2,cFrac]);

  if(!rifles.length||!ammo.length) return <div style={{...sCard,textAlign:"center",color:C.dim,padding:40}}>Add a rifle and ammo in Profiles first.</div>;

  return (
    <div>
      {/* Rifle/Ammo selector */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <div style={{flex:1}}><select style={{...sInput,fontSize:12}} value={hs.rifleId} onChange={e=>set("rifleId",e.target.value)}><option value="">Rifle...</option>{rifles.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select></div>
        <div style={{flex:1}}><select style={{...sInput,fontSize:12}} value={hs.ammoId} onChange={e=>set("ammoId",e.target.value)}><option value="">Ammo...</option>{ammo.map(a=><option key={a.id} value={a.id}>{a.profileName||`${a.manufacturer} ${a.name}`}</option>)}</select></div>
        <div style={{background:isTrued?C.green:C.yellow,color:"#000",borderRadius:4,padding:"4px 8px",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",whiteSpace:"nowrap"}}>{singleBcResult?`BC ${singleBcResult.bc.toFixed(3)} ±${singleBcResult.avgError.toFixed(2)}`:""}</div>
      </div>

      {/* Main display */}
      <div style={{...sCard,padding:16}}>
        <div style={{display:"flex"}}>
          <div style={{flex:1,textAlign:"center",borderRight:`1px solid ${C.border}`}}>
            <div style={{color:C.dim,fontSize:12,fontWeight:600,marginBottom:4}}>Elevation</div>
            <div style={{color:C.text,fontSize:42,fontWeight:700,lineHeight:1}}>{res?elevAbs.toFixed(2):"—"}</div>
            <div style={{color:C.dim,fontSize:11,marginTop:2}}>{uLabel}</div>
            <div style={{color:C.blue,fontSize:16,marginTop:2,fontWeight:600}}>{res?(elevRaw>=0?"▲ UP":"▼ DN"):"—"}</div>
          </div>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{color:C.dim,fontSize:12,fontWeight:600,marginBottom:4}}>Windage</div>
            {wd2 ? (
              <div style={{display:"flex",justifyContent:"center",gap:8,alignItems:"baseline"}}>
                <div><div style={{color:C.text,fontSize:30,fontWeight:700,lineHeight:1}}>{Math.abs(wv1).toFixed(2)}</div><div style={{color:C.dim,fontSize:9}}>MIN</div></div>
                <div style={{color:C.dim,fontSize:16}}>–</div>
                <div><div style={{color:C.text,fontSize:30,fontWeight:700,lineHeight:1}}>{Math.abs(wv2).toFixed(2)}</div><div style={{color:C.dim,fontSize:9}}>MAX</div></div>
              </div>
            ) : (
              <div style={{color:C.text,fontSize:42,fontWeight:700,lineHeight:1}}>{wDisp?wDisp.toFixed(2):"0.00"}</div>
            )}
            <div style={{color:C.dim,fontSize:11,marginTop:2}}>{uLabel}</div>
            <div style={{color:C.blue,fontSize:14,marginTop:2,fontWeight:600}}>{wDisp>0?(wDir==="R"?"► R":"◄ L"):"—"}</div>
          </div>
        </div>
        {/* Solver info */}
        {singleBcResult && <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`,fontSize:11}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{color:conf.color}}>● {conf.label}</span>
            <span style={{color:C.dim}}>{conf.tip}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",color:C.dim}}>
            <span>TM22 BC {singleBcResult.bc.toFixed(4)} from {singleBcResult.numPoints} pts</span>
            <span>avg ±{singleBcResult.avgError.toFixed(2)} max ±{singleBcResult.maxError.toFixed(2)}</span>
          </div>
        </div>}
        {/* Spin drift + cant info */}
        {spinDrift && rangeNum > 50 && (
          <div style={{marginTop:4,paddingTop:4,borderTop:`1px solid ${C.border}`,fontSize:10}}>
            <div style={{display:"flex",justifyContent:"space-between",color:C.dim}}>
              <span>Spin drift: <span style={{color:C.text,fontWeight:600}}>{Math.abs(isMOA?spinDrift.driftMOA:spinDrift.driftMils).toFixed(2)} {uLabel} {spinDir}</span></span>
              <span>SG: {spinDrift.sg.toFixed(2)} · {spinDrift.driftInches>=0?"+":""}{spinDrift.driftInches.toFixed(2)}"</span>
            </div>
            {Math.abs(spinMils) > 0.05 && (
              <div style={{color:C.yellow,fontSize:9,marginTop:2}}>
                At {elevAbs.toFixed(1)} {uLabel} elev, 1° cant adds {Math.abs(calcCantEffect(elevAbs, 1).horizontalMils).toFixed(2)} {uLabel} horizontal shift
              </div>
            )}
          </div>
        )}
      </div>

      {/* Range selector */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:10}}>
        <button style={{...sBtn,width:44,height:44,padding:0,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>set("range",Math.max(tMin,rangeNum-tStep))}>−</button>
        <div style={{textAlign:"center"}}>
          <div style={{color:C.dim,fontSize:10,marginBottom:2}}>Range</div>
          <input style={{...sInput,width:80,textAlign:"center",fontSize:18,fontWeight:700}} inputMode="numeric" value={hs.range===""?"":hs.range} onChange={e=>{const v=e.target.value;set("range",v===""?"":parseInt(v)||"")}} />
          <div style={{color:C.dim,fontSize:10,marginTop:1}}>YD</div>
        </div>
        <button style={{...sBtn,width:44,height:44,padding:0,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>set("range",Math.min(tMax,rangeNum+tStep))}>+</button>
      </div>

      {/* Flight data bar */}
      <div style={{background:C.card,borderRadius:6,padding:"8px 12px",marginBottom:10,display:"flex",gap:16,fontSize:12,justifyContent:"center"}}>
        <span><span style={{color:C.accent}}>{res?res.tof.toFixed(2):"—"}</span> <span style={{color:C.dim}}>s</span></span>
        <span><span style={{color:C.accent}}>{energy?Math.round(energy):"—"}</span> <span style={{color:C.dim}}>ft·lb</span></span>
        <span><span style={{color:C.accent}}>{res?Math.round(res.velocity):"—"}</span> <span style={{color:C.dim}}>fps</span></span>
        <span><span style={{color:C.accent}}>{res?res.mach.toFixed(2):"—"}</span> <span style={{color:C.dim}}>M</span></span>
      </div>

      {/* Wind */}
      <div style={{...sCard,padding:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{color:C.dim,fontSize:10,fontWeight:600}}>WIND</span>
          <button style={{background:C.border,color:C.text,border:"none",borderRadius:4,padding:"3px 8px",fontSize:10,cursor:"pointer"}} onClick={()=>set("dirMode",isClock?"deg":"clock")}>{isClock?"Clock":"Degrees"}</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <div style={{flex:1}}><label style={sLabel}>Target {isClock?"(clk)":"(°)"}</label><input style={sInput} inputMode={isClock?"text":"decimal"} value={hs.targetBearing} onChange={e=>set("targetBearing",e.target.value)} placeholder={isClock?"12:00":"0"} /></div>
          <div style={{flex:1}}><label style={sLabel}>Wind FROM {isClock?"(clk)":"(°)"}</label><input style={sInput} inputMode={isClock?"text":"decimal"} value={hs.windFrom} onChange={e=>set("windFrom",e.target.value)} placeholder={isClock?"3:00":"90"} /></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><label style={sLabel}>Wind Min (mph)</label><input style={sInput} inputMode="decimal" value={hs.wind1Speed} onChange={e=>set("wind1Speed",e.target.value)} placeholder="0" /></div>
          <div style={{flex:1}}><label style={sLabel}>Wind Max (mph)</label><input style={sInput} inputMode="decimal" value={hs.wind2Speed} onChange={e=>set("wind2Speed",e.target.value)} placeholder="0" /></div>
        </div>
        {(w1>0||w2>0) && ((!hs.targetBearing||!hs.windFrom)
          ? <div style={{color:C.yellow,fontSize:10,marginTop:6,fontWeight:600}}>⚠ Set Target and Wind FROM direction — hold = 0 without both</div>
          : <div style={{color:C.dim,fontSize:10,marginTop:6}}>{Math.abs(cFrac)<0.17?"Head/Tail":Math.abs(cFrac)>0.94?"Full Cross":`${(Math.abs(cFrac)*100).toFixed(0)}% cross`} {cFrac>=0?"R":"L"}</div>)}
      </div>

      {/* Environment */}
      <div style={{...sCard,padding:0,overflow:"hidden"}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",cursor:"pointer",borderBottom:hs.showEnv?`1px solid ${C.border}`:"none"}} onClick={()=>set("showEnv",!hs.showEnv)}>
          <span style={{color:C.dim,fontSize:12,fontWeight:600}}>ENVIRONMENT {bleWeather?.source && <span style={{color:C.green,fontSize:10,fontWeight:700}}> ● {bleWeather.source}</span>}</span>
          <span style={{color:C.dim}}>{hs.showEnv?"▲":"▼"}</span>
        </div>
        {hs.showEnv&&(
          <div style={{padding:12}}>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <label style={sLabel}>Chrono'd MV (fps)</label>
                <input style={{...sInput, borderColor: hasChrono ? C.green : C.border}} inputMode="decimal" value={hs.mvOverride} onChange={e=>set("mvOverride",e.target.value)} placeholder="—" />
                <div style={{color:C.dim,fontSize:9,marginTop:2}}>{hasChrono?"Measured today — used directly":"Leave blank if no chrono"}</div>
              </div>
              <div style={{flex:1}}>
                <label style={sLabel}>Estimated MV</label>
                <div style={{...sInput, color: hasChrono ? C.dim : C.text, background: "transparent", border: `1px solid ${hasChrono ? "transparent" : C.border}`, padding: "8px 6px"}}>{estimatedMV.toFixed(0)} fps</div>
                <div style={{color:C.dim,fontSize:9,marginTop:2}}>{profileMV} base {parseFloat(hs.temp)>=59?"+":""}{((parseFloat(hs.temp)-59)*0.8).toFixed(1)} temp</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}><label style={sLabel}>Temp (°F){bleWeather?.temp!==null&&bleWeather?.temp!==undefined?" ●":""}</label><input style={sInput} inputMode="decimal" value={hs.temp} onChange={e=>set("temp",e.target.value)} /></div>
              <div style={{flex:1}}><label style={sLabel}>DA (ft){bleWeather?.pressure!==null&&bleWeather?.pressure!==undefined?" ●":""}</label><input style={sInput} inputMode="numeric" value={hs.da} onChange={e=>set("da",e.target.value)} /></div>
            </div>
            {bleWeather?.windSpeed !== null && bleWeather?.windSpeed !== undefined && (
              <div style={{color:C.green,fontSize:11,marginBottom:4}}>Wind: {bleWeather.windSpeed.toFixed(1)} mph @ {(bleWeather.windDir||0).toFixed(0)}°</div>
            )}
            <div style={{fontSize:10,marginTop:4,padding:"6px 8px",borderRadius:4,background:hasChrono?"rgba(34,197,94,0.1)":"rgba(234,179,8,0.1)"}}>
              {hasChrono ? (
                <span style={{color:C.green}}>✓ USING CHRONO: {hs.mvOverride} fps — no temp adjustment</span>
              ) : (
                <span style={{color:C.yellow}}>⚠ NO CHRONO: Est. {estimatedMV.toFixed(0)} fps — enter chrono'd MV for best accuracy</span>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Range Table */}
      <div style={{...sCard,padding:0,overflow:"hidden",marginTop:10}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",cursor:"pointer",borderBottom:hs.showTable?`1px solid ${C.border}`:"none"}} onClick={()=>set("showTable",!hs.showTable)}>
          <span style={{color:C.dim,fontSize:12,fontWeight:600}}>RANGE TABLE ({uLabel})</span>
          <span style={{color:C.dim}}>{hs.showTable?"▲":"▼"}</span>
        </div>
        {hs.showTable&&(
          <div style={{padding:12}}>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <div style={{flex:1}}><label style={sLabel}>Min</label><select style={sInput} value={tMin} onChange={e=>set("tableMin",parseInt(e.target.value))}>{[5,10,15,25,50,75,100].map(v=><option key={v} value={v}>{v}</option>)}</select></div>
              <div style={{flex:1}}><label style={sLabel}>Max</label><select style={sInput} value={tMax} onChange={e=>set("tableMax",parseInt(e.target.value))}>{[100,150,200,250,300,325,400].map(v=><option key={v} value={v}>{v}</option>)}</select></div>
              <div style={{flex:1}}><label style={sLabel}>Step</label><select style={sInput} value={tStep} onChange={e=>set("tableStep",parseInt(e.target.value))}>{[5,10,15,25,50].map(v=><option key={v} value={v}>{v}</option>)}</select></div>
            </div>
            {(()=>{
              const hasWind = rTable.some(r=>r.wMin!==0||r.wMax!==0);
              const hasBracket = rTable.some(r=>r.wMax!==0);
              const hasSpin = rTable.some(r=>Math.abs(r.sd)>0.005);
              const cols = 2 + (hasWind?1:0) + (hasBracket?1:0) + (hasSpin?1:0);
              return (
                <div style={{display:"grid",gridTemplateColumns:`repeat(${cols}, 1fr)`,gap:2,fontSize:12}}>
                  <span style={{color:C.dim,fontWeight:600,paddingBottom:4}}>Dist</span>
                  <span style={{color:C.dim,fontWeight:600,paddingBottom:4,textAlign:"right"}}>Elev</span>
                  {hasSpin&&<span style={{color:C.dim,fontWeight:600,paddingBottom:4,textAlign:"right"}}>Spin</span>}
                  {hasWind&&<span style={{color:C.dim,fontWeight:600,paddingBottom:4,textAlign:"right"}}>W Min</span>}
                  {hasBracket&&<span style={{color:C.dim,fontWeight:600,paddingBottom:4,textAlign:"right"}}>W Max</span>}
                  {rTable.map(r=>{
                    const hl = r.d===rangeNum;
                    const c = hl?C.accent:C.text;
                    const fw = hl?700:400;
                    return (
                      <React.Fragment key={r.d}>
                        <span style={{color:hl?C.accent:r.confColor,fontWeight:fw}}>{r.d}</span>
                        <span style={{color:c,fontWeight:fw,textAlign:"right"}}>{r.elev>=0?"":"-"}{Math.abs(r.elev).toFixed(2)}</span>
                        {hasSpin&&<span style={{color:hl?C.accent:C.dim,fontWeight:fw,textAlign:"right"}}>{Math.abs(r.sd).toFixed(2)}{r.sd>=0?"R":"L"}</span>}
                        {hasWind&&<span style={{color:hl?C.accent:C.dim,fontWeight:fw,textAlign:"right"}}>{r.wMin?((r.wMin>=0?"":"-")+Math.abs(r.wMin).toFixed(2)):"—"}</span>}
                        {hasBracket&&<span style={{color:hl?C.accent:C.dim,fontWeight:fw,textAlign:"right"}}>{r.wMax?((r.wMax>=0?"":"-")+Math.abs(r.wMax).toFixed(2)):"—"}</span>}
                      </React.Fragment>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}
      </div>

      {/* Wind Log — capture actual drift observations */}
      <div style={{...sCard,padding:0,overflow:"hidden",marginTop:10}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",cursor:"pointer",borderBottom:showWindLog?`1px solid ${C.border}`:"none"}} onClick={()=>setShowWindLog(!showWindLog)}>
          <span style={{color:C.dim,fontSize:12,fontWeight:600}}>WIND LOG {windLog.length>0&&<span style={{color:C.accent}}>({windLog.length})</span>}</span>
          <span style={{color:C.dim}}>{showWindLog?"▲":"▼"}</span>
        </div>
        {showWindLog&&(
          <div style={{padding:12}}>
            <div style={{color:C.dim,fontSize:11,lineHeight:1.5,marginBottom:10,background:C.bg,borderRadius:6,padding:8}}>
              <span style={{color:C.text,fontWeight:600}}>Log actual wind drift.</span> After dialing elevation, shoot without wind hold. Read the horizontal splash offset from your reticle. The app compares your actual vs its predicted drift to calibrate the wind model.
            </div>

            {/* Current conditions summary */}
            {res && (w1>0||w2>0) && cFrac!==0 && (
              <div style={{background:"rgba(59,130,246,0.1)",borderRadius:6,padding:8,marginBottom:10,border:`1px solid rgba(59,130,246,0.2)`}}>
                <div style={{color:C.blue,fontSize:11,fontWeight:600,marginBottom:2}}>PREDICTED @ {rangeNum}yd</div>
                <div style={{color:C.dim,fontSize:11}}>
                  Wind: {w1}{w2>0?`–${w2}`:""} mph, crossing {Math.abs(cFrac*100).toFixed(0)}% → <span style={{color:C.text,fontWeight:600}}>{wDisp.toFixed(2)} {uLabel} {wDir}</span>
                </div>
              </div>
            )}

            {/* Entry form */}
            <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"flex-end"}}>
              <div style={{flex:1}}>
                <label style={sLabel}>Actual Drift ({uLabel})</label>
                <input style={sInput} inputMode="decimal" value={wlActualDrift} onChange={e=>setWlActualDrift(e.target.value)} placeholder="0.00" />
              </div>
              <div style={{minWidth:55}}>
                <label style={sLabel}>Dir</label>
                <select style={{...sInput,padding:"8px 4px",fontSize:13}} value={wlDriftDir} onChange={e=>setWlDriftDir(e.target.value)}>
                  <option value="R">► R</option>
                  <option value="L">◄ L</option>
                </select>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <label style={sLabel}>Note (optional)</label>
              <input style={sInput} value={wlNote} onChange={e=>setWlNote(e.target.value)} placeholder="e.g. gusting, flags limp, mirage left" />
            </div>
            <button style={sBtn} onClick={()=>{
              const drift = parseFloat(wlActualDrift);
              if(isNaN(drift)){setWlMsg("Enter actual drift");return;}
              if(!res){setWlMsg("Select distance first");return;}
              const signedDrift = wlDriftDir==="L" ? -Math.abs(drift) : Math.abs(drift);
              const predDrift = wDisp>0 ? (wDir==="L" ? -wDisp : wDisp) : 0;
              const entry = {
                id: Date.now().toString(),
                timestamp: new Date().toISOString(),
                distance: rangeNum,
                windSpeed1: w1, windSpeed2: w2,
                windFrom: hs.windFrom, targetBearing: hs.targetBearing,
                dirMode: hs.dirMode,
                crossingFrac: cFrac,
                predictedDrift: predDrift,
                actualDrift: signedDrift,
                delta: signedDrift - predDrift,
                unit: uLabel,
                temp: parseFloat(hs.temp), da: parseFloat(hs.da),
                mv: hasChrono ? parseFloat(hs.mvOverride) : estimatedMV,
                bc: 0.0535,
                tof: res.tof,
                note: wlNote
              };
              setWindLog(prev=>[...prev, entry]);
              setWlActualDrift("");setWlNote("");
              setWlMsg(`Logged: ${rangeNum}yd ${Math.abs(drift).toFixed(2)} ${uLabel} ${wlDriftDir} (pred ${Math.abs(predDrift).toFixed(2)})`);
              setTimeout(()=>setWlMsg(""),4000);
            }}>+ Log Wind Observation</button>
            {wlMsg&&<div style={{color:C.green,fontSize:11,marginTop:6}}>{wlMsg}</div>}

            {/* Wind calibration summary */}
            {windLog.length>=3&&(()=>{
              const valid = windLog.filter(w=>Math.abs(w.predictedDrift)>0.05);
              if(valid.length<2) return null;
              const ratios = valid.map(w=>w.actualDrift/w.predictedDrift);
              const avgRatio = ratios.reduce((s,r)=>s+r,0)/ratios.length;
              const errors = valid.map(w=>Math.abs(w.actualDrift-w.predictedDrift));
              const avgErr = errors.reduce((s,e)=>s+e,0)/errors.length;
              const maxErr = Math.max(...errors);
              return (
                <div style={{background:"#0c2d1a",border:`1px solid ${C.green}`,borderRadius:6,padding:10,marginTop:10}}>
                  <div style={{color:C.green,fontSize:12,fontWeight:700,marginBottom:4}}>WIND CALIBRATION</div>
                  <div style={{color:C.dim,fontSize:11,lineHeight:1.6}}>
                    <span style={{color:C.text,fontWeight:600}}>{valid.length} observations</span> with wind predictions<br/>
                    Correction factor: <span style={{color:C.text,fontWeight:600}}>×{avgRatio.toFixed(2)}</span>
                    {avgRatio>1.1?<span style={{color:C.yellow}}> — model under-predicts drift</span>:
                     avgRatio<0.9?<span style={{color:C.yellow}}> — model over-predicts drift</span>:
                     <span style={{color:C.green}}> — model is close</span>}<br/>
                    Avg error: <span style={{color:avgErr<0.15?C.green:avgErr<0.3?C.yellow:C.red,fontWeight:600}}>±{avgErr.toFixed(2)} {uLabel}</span>
                    {" "}max: ±{maxErr.toFixed(2)}
                  </div>
                </div>
              );
            })()}

            {/* Wind log entries */}
            {windLog.length>0&&(
              <div style={{marginTop:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{color:C.dim,fontSize:10,fontWeight:600}}>OBSERVATIONS ({windLog.length})</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr auto",gap:2,fontSize:10}}>
                  <span style={{color:C.dim,fontWeight:600}}>Dist</span>
                  <span style={{color:C.dim,fontWeight:600,textAlign:"right"}}>Pred</span>
                  <span style={{color:C.dim,fontWeight:600,textAlign:"right"}}>Actual</span>
                  <span style={{color:C.dim,fontWeight:600,textAlign:"right"}}>Delta</span>
                  <span></span>
                  {[...windLog].reverse().slice(0,20).map(w=>(
                    <React.Fragment key={w.id}>
                      <span style={{color:C.text}}>{w.distance}yd</span>
                      <span style={{color:C.dim,textAlign:"right"}}>{w.predictedDrift>=0?"+":""}{w.predictedDrift.toFixed(2)}</span>
                      <span style={{color:C.text,textAlign:"right"}}>{w.actualDrift>=0?"+":""}{w.actualDrift.toFixed(2)}</span>
                      <span style={{color:Math.abs(w.delta)<0.1?C.green:Math.abs(w.delta)<0.2?C.yellow:C.red,textAlign:"right"}}>{w.delta>=0?"+":""}{w.delta.toFixed(2)}</span>
                      <span style={{color:C.red,cursor:"pointer",textAlign:"center"}} onClick={()=>setWindLog(prev=>prev.filter(x=>x.id!==w.id))}>✕</span>
                    </React.Fragment>
                  ))}
                </div>
                <div style={{marginTop:4,padding:"4px 6px",background:"rgba(0,0,0,0.3)",borderRadius:4,fontSize:9,color:C.dim,lineHeight:1.6}}>
                  Pred = model prediction · Actual = observed splash · Delta = actual − pred (+ = more drift than model)
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function GuideTab() {

    { id: "truing", label: "Truing" },

  const p = { color: C.dim, fontSize: 13, lineHeight: 1.5, marginBottom: 8 };
  const li = { color: C.dim, fontSize: 13, lineHeight: 1.6, marginBottom: 4, paddingLeft: 8 };

        <div>
          <div style={sCard}>
            <div style={hdr}>Before the Range</div>
            <div style={li}><span style={num}>1.</span> <span style={em}>Profiles tab</span> → create rifle (scope height, zero distance) and ammo (manufacturer, product, lot number).</div>

            <div style={li}><span style={num}>3.</span> Run a <span style={em}>Tall Target Test</span> if scope tracking is unverified. Truing tab → Scope Tracking section.</div>
            <div style={li}><span style={num}>4.</span> Pick <span style={em}>one chronograph</span> and use it exclusively. Mixing chronos contaminates your MV baseline.</div>
          </div>

          <div style={sCard}>
            <div style={hdr}>At the Range — Truing Session</div>
            <div style={p}>The app solves a <span style={em}>single TM22 BC</span> from all your truing data across all sessions. Every point you add improves the BC estimate. Focus on 175yd+ for the best solver accuracy.</div>

            <div style={sub}>Step 1: Setup</div>
            <div style={li}><span style={num}>•</span> <span style={{...em,color:C.green}}>Chrono first</span> — 10 rounds, enter mean in Chrono MV field.</div>
            <div style={li}><span style={num}>•</span> Record <span style={em}>temperature</span> and <span style={em}>density altitude</span> from Kestrel or weather app.</div>
            <div style={li}><span style={num}>•</span> Enter temp and DA into the Truing tab's Session Conditions.</div>

            <div style={sub}>Step 2: Zero (5 rounds)</div>
            <div style={li}><span style={num}>•</span> Confirm zero at 50yd. Adjust if needed.</div>

            <div style={sub}>Step 3: Shoot the Ladder</div>
            <div style={p}>Use <span style={em}>Collection Mode</span> for fast entry. Shoot 3 groups per distance, 5 rounds each, enter the average dial-up.</div>
            <div style={{display:"grid",gridTemplateColumns:"auto auto auto",gap:"2px 10px",fontSize:12,color:C.dim,paddingTop:4,marginBottom:8}}>
              <span style={em}>Distance</span><span style={em}>Priority</span><span style={em}>Why</span>
              <span style={{color:C.dim}}>100–125yd</span><span style={{color:C.yellow}}>Optional</span><span>Low solver value — BC insensitive here</span>
              <span style={{color:C.text}}>175yd</span><span style={{color:C.green}}>High</span><span>Entering sweet spot for BC solving</span>
              <span style={{color:C.text}}>200yd</span><span style={{color:C.green}}>High</span><span>Core truing distance</span>
              <span style={{color:C.text}}>225yd</span><span style={{color:C.green}}>High</span><span>Core truing distance</span>
              <span style={{color:C.text}}>250yd</span><span style={{color:C.green}}>High</span><span>Strong BC signal</span>
              <span style={{color:C.text}}>275yd</span><span style={{color:C.blue}}>Good</span><span>Extends validated range</span>
              <span style={{color:C.text}}>302yd</span><span style={{color:C.blue}}>Good</span><span>Max competition distance</span>
            </div>
            <div style={li}><span style={{...num, color: C.blue}}>APP:</span> Enter each distance + dial-up → Save. The app validates each point against the current BC and warns if something looks wrong.</div>
            <div style={li}><span style={{...num, color: C.yellow}}>KESTREL:</span> Compare SHORT profile (&lt;150yd) and LONG profile (&gt;150yd) against actual. Adjust G7/G1 BC as needed.</div>

            <div style={divider} />
            <div style={p}><span style={good}>✓ Minimum session:</span> Chrono + Zero + 200yd + 250yd = 30 rounds.</div>
            <div style={p}><span style={good}>✓ Better session:</span> Add 175 + 225 + 275 = 55 rounds.</div>
            <div style={p}><span style={good}>✓ Full session:</span> Add 302yd = 65 rounds. Per rifle.</div>
            <div style={p}><span style={em}>More sessions = tighter BC.</span> Three sessions across different conditions got avg ±0.14 MIL. Five sessions should reach ±0.10.</div>
          </div>

          <div style={sCard}>
            <div style={hdr}>Kestrel — Two Optimized Profiles</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
              <div style={{background:C.bg,borderRadius:6,padding:10,border:`1px solid ${C.border}`}}>
                <div style={{color:C.yellow,fontSize:13,fontWeight:700,marginBottom:6}}>SHORT (50–150yd)</div>
                <div style={{color:C.dim,fontSize:12,lineHeight:1.6}}>
                  Drag: <span style={em}>G7</span><br/>
                  BC: <span style={em}>~0.078</span> (true at 125yd)<br/>
                  MV: <span style={em}>Your real chrono</span>
                </div>
              </div>
              <div style={{background:C.bg,borderRadius:6,padding:10,border:`1px solid ${C.border}`}}>
                <div style={{color:C.blue,fontSize:13,fontWeight:700,marginBottom:6}}>LONG (150–300yd)</div>
                <div style={{color:C.dim,fontSize:12,lineHeight:1.6}}>
                  Drag: <span style={em}>G1</span><br/>
                  BC: <span style={em}>~0.50–0.55</span> (true at 225yd)<br/>
                  MV: <span style={em}>Same real chrono</span>
                </div>
              </div>
            </div>

            <div style={{...p,marginTop:10}}><span style={warn}>⚠ Never adjust MV to make predictions fit.</span> MV is measured. BC is the only tuning knob on the Kestrel. If the prediction won't match with any reasonable BC, check your zero and scope tracking first.</div>

          <div style={sCard}>
            <div style={hdr}>Key Rules</div>

            <div style={p}>22LR bullets spend their entire flight in the transonic zone (Mach 0.85–0.95 at the muzzle, dropping to Mach 0.65–0.75 at 300yd). Neither G1 nor G7 models this zone correctly, but they're wrong in different ways:</div>
