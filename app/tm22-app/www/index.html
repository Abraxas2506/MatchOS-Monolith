    { status: "future", label: "TRAIN: Training plan generator — prioritize drills based on weakest positions/props" },
    // FUTURE — MATCH INTELLIGENCE
    { status: "future", label: "INTEL: Stage difficulty rating — community hit rate data per target per venue" },
    { status: "future", label: "INTEL: Venue history — your past results, wind patterns, what worked at this range" },
    { status: "future", label: "INTEL: Stage strategy optimizer — optimal engagement order based on your hit probabilities" },
    // FUTURE — AMMO MANAGEMENT
    { status: "future", label: "AMMO: Lot testing protocol — structured test, app guides procedure, auto-captures data" },
    { status: "future", label: "AMMO: Lot comparison tool — overlay group size + MV distributions side by side" },
    { status: "future", label: "AMMO: Lot purchase decision — new lot MV vs node map, buy/don't buy recommendation" },
    // FUTURE — RIFLE MAINTENANCE
    { status: "future", label: "MAINT: Scope zero drift tracking — log zero checks over time, detect shift" },
    { status: "future", label: "MAINT: Torque spec log — action screws, ring screws, last torqued date" },
    { status: "future", label: "MAINT: Parts replacement log — springs, extractors, firing pins with round count" },
    // FUTURE — ENVIRONMENTAL
    { status: "future", label: "ENV: Mirage reading guide — interactive reference for boil/flow through scope" },
    { status: "future", label: "ENV: Light condition tracking — POI shift from lighting angle on steel at distance" },
    // FUTURE — BLE INTEGRATION
    { status: "future", label: "BLE: Calypso wind — standard 0x181A, trivial (UUIDs documented)" },
    { status: "future", label: "BLE: Kestrel 5700 weather — 67 UUIDs extracted from Strelok, needs nRF mapping" },
    { status: "future", label: "BLE: Sig Kilo 3K rangefinder — protocol mapped from BDX APK, needs nRF capture" },
    { status: "future", label: "BLE: Hub architecture — phone connects Card + Kilo + Calypso simultaneously" },
    { status: "future", label: "Strelok SDK upload — extract decoded Kestrel characteristic mappings" },
    // FUTURE — HARDWARE (DOPE DISPLAY)
    { status: "future", label: "HW: DOPE display V1 — ESP32-C3 + 2.9\" e-paper + BME280 weather (~$35 BOM)" },
    { status: "future", label: "HW: LSM6DSO IMU — cant ±0.2°, stability, muzzle trace (replaces SG Pulse)" },
    { status: "future", label: "HW: MAX4466 acoustic shot detection — MEMS mic, adjustable sensitivity" },
    { status: "future", label: "HW: WS2812B ocular LED — green=level, red=right cant, blue=left cant" },
    { status: "future", label: "HW: LIS3MDL compass mount — Picatinny, pogo pin I2C bridge, per-rifle" },
    { status: "future", label: "HW: V2 ultrasonic anemometer — 4× 40kHz transducers, replaces Calypso" },
    // FUTURE — BUSINESS
    { status: "future", label: "BIZ: YouTube 10-episode series (outlined, content-first strategy)" },
    { status: "future", label: "BIZ: TM22 data licensing to AB/Kestrel/Revic/SIG" },
    { status: "future", label: "BIZ: App subscription model ($9.99/mo Pro tier)" },
    { status: "future", label: "BIZ: Hardware sales — DOPE display $150-200 retail, 75-85% margin" },
    { status: "future", label: "BIZ: Defense/military fire control kit ($300 BOM → $3-5K system)" },
    { status: "future", label: "BIZ: Provisional patent — wind bracket probability method ($320)" },
  ];

  return (
    <div>
      {/* Your Notes */}
      <div style={sCard}>
        <div style={{color:C.accent,fontSize:14,fontWeight:700,marginBottom:8}}>YOUR NOTES</div>
        {devNotes.filter(n=>n.status==="open").length === 0 ? (
          <div style={{color:C.dim,fontSize:12,textAlign:"center",padding:10}}>No open notes. Add bugs, features, or observations below.</div>
        ) : (
          devNotes.filter(n=>n.status==="open").map(n => {
            const ti = tagInfo(n.tag);
            const dt = new Date(n.timestamp);
            const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,"0")}`;
            return (
              <div key={n.id} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:6,paddingLeft:4}}>
                <span style={{cursor:"pointer",fontSize:12,color:C.dim,marginTop:1}} onClick={()=>toggleStatus(n.id)}>○</span>
                <div style={{flex:1}}>
                  <span style={{fontSize:10,color:ti.color,fontWeight:700}}>{ti.label}</span>
                  <span style={{fontSize:9,color:C.dim,marginLeft:6}}>{dateStr}</span>
                  <div style={{color:C.text,fontSize:11,lineHeight:1.4}}>{n.text}</div>
                </div>
                <span style={{cursor:"pointer",fontSize:11,color:C.red}} onClick={()=>deleteNote(n.id)}>✕</span>
              </div>
            );
          })
        )}
      </div>

      {/* Roadmap */}
      <div style={sCard}>
        <div style={{color:C.accent,fontSize:14,fontWeight:700,marginBottom:8}}>DEVELOPMENT ROADMAP</div>
        {["next", "done", "future"].map(phase => (
          <div key={phase} style={{marginBottom:10}}>
            <div style={{color: phase==="done"?C.green:phase==="next"?C.yellow:C.dim, fontSize:11, fontWeight:700, marginBottom:4}}>
              {phase==="next"?"▶ NEXT UP — BUILDING NOW":phase==="done"?`✓ COMPLETED (${roadmap.filter(r=>r.status==="done").length})`:"◻ FUTURE — NOT YET SCHEDULED"}
            </div>
            {phase==="future" ? (
              <>
                {[
                  {prefix:"future", filter:r=>!r.label.startsWith("BLE:")&&!r.label.startsWith("HW:")&&!r.label.startsWith("BIZ:")&&!r.label.startsWith("CAL:")&&!r.label.startsWith("TEAM:")&&!r.label.startsWith("TRAIN:")&&!r.label.startsWith("INTEL:")&&!r.label.startsWith("AMMO:")&&!r.label.startsWith("MAINT:")&&!r.label.startsWith("ENV:"), title:"SOFTWARE"},
                  {prefix:"train", filter:r=>r.label.startsWith("TRAIN:"), title:"TRAINING & DRILLS"},
                  {prefix:"intel", filter:r=>r.label.startsWith("INTEL:"), title:"MATCH INTELLIGENCE"},
                  {prefix:"ammo", filter:r=>r.label.startsWith("AMMO:"), title:"AMMO MANAGEMENT"},
                  {prefix:"cal", filter:r=>r.label.startsWith("CAL:"), title:"MATCH CALENDAR & TRACKING"},
                  {prefix:"team", filter:r=>r.label.startsWith("TEAM:"), title:"TEAM SHARING"},
                  {prefix:"maint", filter:r=>r.label.startsWith("MAINT:"), title:"RIFLE MAINTENANCE"},
                  {prefix:"env", filter:r=>r.label.startsWith("ENV:"), title:"ENVIRONMENTAL"},
                  {prefix:"ble", filter:r=>r.label.startsWith("BLE:"), title:"BLE INTEGRATION"},
                  {prefix:"hw", filter:r=>r.label.startsWith("HW:"), title:"HARDWARE — DOPE DISPLAY"},
                  {prefix:"biz", filter:r=>r.label.startsWith("BIZ:"), title:"BUSINESS"},
                ].map(cat => {
                  const items = roadmap.filter(r=>r.status==="future").filter(cat.filter);
                  if(!items.length) return null;
                  return (
                    <div key={cat.prefix} style={{marginBottom:8}}>
                      <div style={{color:C.dim,fontSize:9,fontWeight:700,marginBottom:2,marginTop:6,paddingLeft:4}}>{cat.title}</div>
                      {items.map((r,i) => (
                        <div key={i} style={{color:C.text,fontSize:11,lineHeight:1.6,paddingLeft:8}}>
                          ○ {r.label.replace(/^(BLE|HW|BIZ): /,"")}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </>
            ) : (
              roadmap.filter(r=>r.status===phase).map((r,i) => (
                <div key={i} style={{color: phase==="done"?C.dim:C.text, fontSize:11, lineHeight:1.6, paddingLeft:8}}>
                  {phase==="done"?"✓":phase==="next"?"▸":"○"} {r.label}
                </div>
              ))
            )}
          </div>
        ))}
      </div>

      {/* Session stats */}
      <div style={sCard}>
        <div style={{color:C.accent,fontSize:14,fontWeight:700,marginBottom:8}}>CURRENT BUILD STATS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:12,color:C.dim}}>
          <span>Build:</span><span style={{color:C.text}}>MatchOS V3 — TM22 Engine + Wind Log + Spin Drift</span>
          <span>Date:</span><span style={{color:C.text}}>Feb 18, 2026</span>
          <span>Sessions:</span><span style={{color:C.text}}>9 Claude chats (S34–S35)</span>
          <span>Engine:</span><span style={{color:C.text}}>TM22 single BC 0.0535</span>
          <span>Accuracy:</span><span style={{color:C.text}}>avg ±0.11 max ±0.30 MIL</span>
          <span>Data:</span><span style={{color:C.text}}>28 pts, 4 field sessions</span>
          <span>DA range:</span><span style={{color:C.text}}>-328 to 1007 ft (1335ft)</span>
        </div>
      </div>

      {/* Add note */}
      <div style={sCard}>
        <div style={{color:C.accent,fontSize:14,fontWeight:700,marginBottom:8}}>ADD NOTE</div>
        <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
          {tags.map(t => (
            <button key={t.id} onClick={()=>setNoteTag(t.id)} style={{
              ...sBtnSm, padding:"4px 10px", fontSize:11,
              background: noteTag===t.id ? t.color : C.card,
              border: noteTag===t.id ? "none" : `1px solid ${C.border}`,
              opacity: noteTag===t.id ? 1 : 0.6
            }}>{t.label}</button>
          ))}
        </div>
        <textarea style={{...sInput, minHeight:60, resize:"vertical", fontFamily:"system-ui"}} value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Describe the bug, feature idea, or observation..." />
        <button style={{...sBtn,marginTop:6}} onClick={addNote}>+ Add Note</button>
      </div>

      {/* Completed notes */}
      {devNotes.filter(n=>n.status==="done").length > 0 && (
        <div style={sCard}>
          <div style={{color:C.dim,fontSize:11,fontWeight:600,marginBottom:6}}>RESOLVED ({devNotes.filter(n=>n.status==="done").length})</div>
          {devNotes.filter(n=>n.status==="done").map(n => {
            const ti = tagInfo(n.tag);
            return (
              <div key={n.id} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:4,paddingLeft:4,opacity:0.5}}>
                <span style={{cursor:"pointer",fontSize:12,color:C.green,marginTop:1}} onClick={()=>toggleStatus(n.id)}>✓</span>
                <div style={{flex:1}}>
                  <span style={{fontSize:10,color:ti.color,fontWeight:700}}>{ti.label}</span>
                  <span style={{color:C.dim,fontSize:11,marginLeft:6,textDecoration:"line-through"}}>{n.text}</span>
                </div>
                <span style={{cursor:"pointer",fontSize:11,color:C.red}} onClick={()=>deleteNote(n.id)}>✕</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================================
// ============================================================================
// APP — with persistence + BLE
// ============================================================================
const STORAGE_KEY = "tm22_data_v3";

function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("hud");
  const [rifles, setRifles] = useState([]);
  const [ammo, setAmmo] = useState([]);
  const [truingData, setTruingData] = useState({});
  const [windLog, setWindLog] = useState([]);
  const [devNotes, setDevNotes] = useState([]);
  const [bleWeather, setBleWeather] = useState(null);
  const [hudState, setHudState] = useState({
    rifleId:"",ammoId:"",range:100,temp:"59",da:"0",mvOverride:"",
    showEnv:false,showTable:false,
    tableMin:25,tableMax:325,tableStep:25,
    wind1Speed:"",wind2Speed:"",targetBearing:"12:00",windFrom:"3:00",dirMode:"clock"
  });

  // Load from localStorage on mount
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (d.rifles) setRifles(d.rifles);
        if (d.ammo) setAmmo(d.ammo);
        if (d.truingData) setTruingData(d.truingData);
        if (d.windLog) setWindLog(d.windLog);
        if (d.devNotes) setDevNotes(d.devNotes);
        if (d.tab) setTab(d.tab);
        if (d.hudState) {
          // Migrate blank bearings to full-value-crosswind defaults
          // (legacy state stored "" which made cFrac=sin(0)=0 → wind hold stuck at 0)
          const hs = {...d.hudState};
          if (!hs.targetBearing) hs.targetBearing = "12:00";
          if (!hs.windFrom) hs.windFrom = "3:00";
          setHudState(prev => ({...prev, ...hs}));
        }
      }
    } catch (e) { console.warn("Load failed:", e); }
    setLoaded(true);
  }, []);

  // Save to localStorage on every change
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ rifles, ammo, truingData, windLog, devNotes, tab, hudState }));
    } catch (e) { console.warn("Save failed:", e); }
  }, [rifles, ammo, truingData, windLog, devNotes, tab, hudState, loaded]);

  // Handle BLE weather updates (from Calypso/Kestrel/BME280)
  const onBleWeather = useCallback((w) => {
    setBleWeather(w);
  }, []);

  if (!loaded) return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.dim, fontFamily: "system-ui" }}>
      Loading...
    </div>
  );

  const tabs = [
    {id:"hud",label:"HUD",icon:"◎"},
    {id:"truing",label:"Truing",icon:"◉"},
    {id:"profiles",label:"Profiles",icon:"☰"},
    {id:"ble",label:"BLE",icon:"📡"},
    {id:"guide",label:"Guide",icon:"📋"},
    {id:"dev",label:"Dev",icon:"🔧"},
  ];

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",fontFamily:"system-ui, -apple-system, sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:C.accent,fontSize:16,fontWeight:700,letterSpacing:1}}>MatchOS</span>
        <span style={{color:C.dim,fontSize:9}}>TM22 Engine · v3</span>
      </div>
      <div style={{flex:1,padding:12,paddingBottom:70,overflowY:"auto"}}>
        {tab==="hud"&&<HudTab rifles={rifles} ammo={ammo} truingData={truingData} bleWeather={bleWeather} hudState={hudState} setHudState={setHudState} windLog={windLog} setWindLog={setWindLog} />}
        {tab==="truing"&&<TruingTab rifles={rifles} ammo={ammo} setRifles={setRifles} truingData={truingData} setTruingData={setTruingData} />}
        {tab==="profiles"&&<ProfilesTab rifles={rifles} setRifles={setRifles} ammo={ammo} setAmmo={setAmmo} />}
        {tab==="ble"&&<BlePanel onWeatherUpdate={onBleWeather} />}
        {tab==="guide"&&<GuideTab />}
        {tab==="dev"&&<DevTab devNotes={devNotes} setDevNotes={setDevNotes} />}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t.id?C.accent:C.dim,borderTop:tab===t.id?`2px solid ${C.accent}`:"2px solid transparent"}}>
            <span style={{fontSize:16}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:600}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
