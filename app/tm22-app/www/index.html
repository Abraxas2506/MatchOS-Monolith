<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================================
// BLE SERVICE — DOPE Card, Calypso, Kestrel, Sig Kilo
// ============================================================================
const BLE = {
  available: false,
  plugin: null,
  connected: {},  // deviceId -> { type, name }

  // Device UUIDs
  DOPE_CARD: {
    service: "4fafc201-1fb5-459e-8fcc-c5c9c331914b",
    dopeWrite: "beb5483e-36e1-4688-b7f5-ea07361b26a8",
    weatherRead: "beb5483f-36e1-4688-b7f5-ea07361b26a8",
    imuRead: "beb54840-36e1-4688-b7f5-ea07361b26a8",
    shotNotify: "beb54841-36e1-4688-b7f5-ea07361b26a8",
    nameFilter: "TM22"
  },
  CALYPSO: {
    service: "0000181a-0000-1000-8000-00805f9b34fb",
    temp: "00002a6e-0000-1000-8000-00805f9b34fb",
    pressure: "00002a6d-0000-1000-8000-00805f9b34fb",
    humidity: "00002a6f-0000-1000-8000-00805f9b34fb",
    windSpeed: "00002a72-0000-1000-8000-00805f9b34fb",
    windDir: "00002a73-0000-1000-8000-00805f9b34fb",
    nameFilter: "CALYPSO"
  },
  KESTREL: {
    service: "ffffffff-c446-4c4f-8c64-000000000000",
    nameFilter: "Kestrel"
    // Characteristic UUIDs TBD — nRF Connect mapping session required
  },
  SIG_KILO: {
    service: "0000fff0-0000-1000-8000-00805f9b34fb",
    txChar: "0000fff1-0000-1000-8000-00805f9b34fb",
    rxChar: "0000fff2-0000-1000-8000-00805f9b34fb",
    nameFilter: "KILO"
  },

  async init() {
    try {
      if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
        const plugins = window.Capacitor.Plugins;
        if (plugins && plugins.BluetoothLe) {
          this.plugin = plugins.BluetoothLe;
          await this.plugin.initialize();
          this.available = true;
          console.log("BLE: Capacitor plugin ready");
          return true;
        }
      }
      console.log("BLE: Not available (browser or plugin missing)");
      return false;
    } catch (e) {
      console.warn("BLE init failed:", e);
      return false;
    }
  },

  async scan(nameFilter, timeout = 5000) {
    if (!this.available) return [];
    const devices = [];
    try {
      await this.plugin.requestLEScan({ services: [], namePrefix: nameFilter }, (result) => {
        if (result.device && !devices.find(d => d.deviceId === result.device.deviceId)) {
          devices.push({ deviceId: result.device.deviceId, name: result.device.name || "Unknown" });
        }
      });
      await new Promise(r => setTimeout(r, timeout));
      await this.plugin.stopLEScan();
    } catch (e) { console.warn("Scan error:", e); }
    return devices;
  },

  async connect(deviceId, type) {
    if (!this.available) return false;
    try {
      await this.plugin.connect(deviceId, (disconnectId) => {
        delete this.connected[disconnectId];
        console.log("BLE: Disconnected", disconnectId);
      });
      this.connected[deviceId] = { type };
      console.log("BLE: Connected", deviceId, type);
      return true;
    } catch (e) { console.warn("Connect error:", e); return false; }
  },

  async disconnect(deviceId) {
    if (!this.available) return;
    try { await this.plugin.disconnect(deviceId); } catch (e) {}
    delete this.connected[deviceId];
  },

  async read(deviceId, serviceUUID, charUUID) {
    if (!this.available) return null;
    try {
      const result = await this.plugin.read(deviceId, serviceUUID, charUUID);
      return result?.value ? new DataView(this._b64ToBuffer(result.value)) : null;
    } catch (e) { console.warn("Read error:", e); return null; }
  },

  async write(deviceId, serviceUUID, charUUID, data) {
    if (!this.available) return false;
    try {
      const b64 = this._bufferToB64(data);
      await this.plugin.write(deviceId, serviceUUID, charUUID, b64);
      return true;
    } catch (e) { console.warn("Write error:", e); return false; }
  },

  async startNotify(deviceId, serviceUUID, charUUID, callback) {
    if (!this.available) return false;
    try {
      await this.plugin.startNotifications(deviceId, serviceUUID, charUUID, (result) => {
        if (result?.value) callback(new DataView(this._b64ToBuffer(result.value)));
      });
      return true;
    } catch (e) { console.warn("Notify error:", e); return false; }
  },

  // === DOPE CARD: Build and send packet ===
  buildDopePacket(stageData) {
    // Binary format matching ESP32 firmware:
    // [stageName 16B][totalRounds 1B][numEngagements 1B][windMph 1B][tempF 1B]
    // Per engagement: [label 8B][posLabel 8B][distYd 2B][shots 1B][elevCentimil 2B signed]
    //                 [windCentimil 2B signed][confidence 1B][windDir 1B][targetSizeIn 1B]
    const buf = new ArrayBuffer(20 + stageData.engagements.length * 25);
    const dv = new DataView(buf);
    let offset = 0;
    // Stage name (16 bytes, padded)
    const nameBytes = new TextEncoder().encode((stageData.name || "").slice(0, 16).padEnd(16, "\0"));
    nameBytes.forEach((b, i) => dv.setUint8(offset + i, b));
    offset += 16;
    dv.setUint8(offset++, stageData.totalRounds || 0);
    dv.setUint8(offset++, stageData.engagements.length);
    dv.setUint8(offset++, Math.round(stageData.windMph || 0));
    dv.setUint8(offset++, Math.round(stageData.tempF || 70));
    // Engagements
    for (const eng of stageData.engagements) {
      const label = new TextEncoder().encode((eng.label || "").slice(0, 8).padEnd(8, "\0"));
      label.forEach((b, i) => dv.setUint8(offset + i, b));
      offset += 8;
      const posLabel = new TextEncoder().encode((eng.position || "").slice(0, 8).padEnd(8, "\0"));
      posLabel.forEach((b, i) => dv.setUint8(offset + i, b));
      offset += 8;
      dv.setUint16(offset, eng.distYd || 0, true); offset += 2;
      dv.setUint8(offset++, eng.shots || 1);
      dv.setInt16(offset, Math.round((eng.elevMil || 0) * 100), true); offset += 2;
      dv.setInt16(offset, Math.round((eng.windMil || 0) * 100), true); offset += 2;
      dv.setUint8(offset++, eng.confidence || 0);
      dv.setUint8(offset++, eng.windDir || 0);  // 0=none 1=left 2=right
      dv.setUint8(offset++, eng.targetSizeIn || 6);
    }
    return new Uint8Array(buf, 0, offset);
  },

  async sendDope(deviceId, stageData) {
    const packet = this.buildDopePacket(stageData);
    return await this.write(deviceId, this.DOPE_CARD.service, this.DOPE_CARD.dopeWrite, packet);
  },

  // === CALYPSO: Parse standard BLE environmental data ===
  parseCalypsoTemp(dv) { return dv.getInt16(0, true) / 100; },  // °C
  parseCalypsoPressure(dv) { return dv.getUint32(0, true) / 10; },  // Pa → /10 = dPa
  parseCalypsoHumidity(dv) { return dv.getUint16(0, true) / 100; },  // %
  parseCalypsoWindSpeed(dv) { return dv.getUint16(0, true) / 100; },  // m/s
  parseCalypsoWindDir(dv) { return dv.getUint16(0, true) / 100; },  // degrees

  // === Helpers ===
  _b64ToBuffer(b64) {
    const bin = atob(b64);
    const buf = new ArrayBuffer(bin.length);
    const u8 = new Uint8Array(buf);
    for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    return buf;
  },
  _bufferToB64(u8arr) {
    let bin = "";
    u8arr.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
  }
};

// Initialize BLE on load
BLE.init();

// ============================================================================
// BLE CONNECTION PANEL (reusable component)
// ============================================================================
function BlePanel({ onWeatherUpdate, onRangeUpdate }) {
  const [bleReady, setBleReady] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [devices, setDevices] = useState({
    dopeCard: null, calypso: null, kestrel: null, sigKilo: null
  });
  const [weather, setWeather] = useState({ temp: null, pressure: null, humidity: null, windSpeed: null, windDir: null, source: null });
  const [lastRange, setLastRange] = useState(null);
  const [status, setStatus] = useState("");

  useEffect(() => {
    const check = async () => { setBleReady(BLE.available || await BLE.init()); };
    check();
  }, []);

  const scanAndConnect = async (type) => {
    if (!bleReady) { setStatus("BLE not available"); return; }
    setScanning(true);
    setStatus("Scanning...");
    const config = BLE[type === "dopeCard" ? "DOPE_CARD" : type === "calypso" ? "CALYPSO" : type === "kestrel" ? "KESTREL" : "SIG_KILO"];
    const found = await BLE.scan(config.nameFilter, 5000);
    if (found.length === 0) { setStatus("No devices found"); setScanning(false); return; }
    // Auto-connect to first match
    const dev = found[0];
    setStatus("Connecting to " + dev.name + "...");
    const ok = await BLE.connect(dev.deviceId, type);
    if (ok) {
      setDevices(prev => ({ ...prev, [type]: { id: dev.deviceId, name: dev.name } }));
      setStatus("Connected: " + dev.name);
      // Start notifications based on type
      if (type === "calypso") { startCalypsoNotify(dev.deviceId); }
      if (type === "sigKilo") { startKiloNotify(dev.deviceId); }
    } else {
      setStatus("Connection failed");
    }
    setScanning(false);
  };

  const disconnectDevice = async (type) => {
    const dev = devices[type];
    if (dev) {
      await BLE.disconnect(dev.id);
      setDevices(prev => ({ ...prev, [type]: null }));
      setStatus("Disconnected");
    }
  };

  const startCalypsoNotify = async (deviceId) => {
    const svc = BLE.CALYPSO.service;
    await BLE.startNotify(deviceId, svc, BLE.CALYPSO.temp, (dv) => {
      const tempC = BLE.parseCalypsoTemp(dv);
      const tempF = tempC * 9/5 + 32;
      setWeather(prev => { const n = {...prev, temp: tempF, source: "Calypso"}; onWeatherUpdate?.(n); return n; });
    });
    await BLE.startNotify(deviceId, svc, BLE.CALYPSO.pressure, (dv) => {
      const pa = BLE.parseCalypsoPressure(dv);
      const inHg = pa / 3386.39;
      setWeather(prev => { const n = {...prev, pressure: inHg, source: "Calypso"}; onWeatherUpdate?.(n); return n; });
    });
    await BLE.startNotify(deviceId, svc, BLE.CALYPSO.humidity, (dv) => {
      const h = BLE.parseCalypsoHumidity(dv);
      setWeather(prev => { const n = {...prev, humidity: h, source: "Calypso"}; onWeatherUpdate?.(n); return n; });
    });
    await BLE.startNotify(deviceId, svc, BLE.CALYPSO.windSpeed, (dv) => {
      const ms = BLE.parseCalypsoWindSpeed(dv);
      const mph = ms * 2.237;
      setWeather(prev => { const n = {...prev, windSpeed: mph, source: "Calypso"}; onWeatherUpdate?.(n); return n; });
    });
    await BLE.startNotify(deviceId, svc, BLE.CALYPSO.windDir, (dv) => {
      const deg = BLE.parseCalypsoWindDir(dv);
      setWeather(prev => { const n = {...prev, windDir: deg, source: "Calypso"}; onWeatherUpdate?.(n); return n; });
    });
  };

  const startKiloNotify = async (deviceId) => {
    // Subscribe to range messages from Sig Kilo
    await BLE.startNotify(deviceId, BLE.SIG_KILO.service, BLE.SIG_KILO.rxChar, (dv) => {
      // TODO: Parse RangeMessage byte format after nRF Connect recon
      // For now, log raw data
      console.log("Kilo RX:", new Uint8Array(dv.buffer));
    });
  };

  const DevBtn = ({ type, label, icon }) => {
    const dev = devices[type];
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>{icon}</span>
          <div>
            <div style={{ color: C.text, fontSize: 13, fontWeight: 600 }}>{label}</div>
            {dev && <div style={{ color: C.green, fontSize: 11 }}>{dev.name}</div>}
          </div>
        </div>
        {dev ? (
          <button onClick={() => disconnectDevice(type)} style={{ ...sBtnSm, background: C.red, fontSize: 11, padding: "4px 10px" }}>Disconnect</button>
        ) : (
          <button onClick={() => scanAndConnect(type)} disabled={scanning} style={{ ...sBtnSm, fontSize: 11, padding: "4px 10px", opacity: scanning ? 0.5 : 1 }}>
            {scanning ? "..." : "Connect"}
          </button>
        )}
      </div>
    );
  };

  return (
    <div>
      {!bleReady && (
        <div style={{ ...sCard, textAlign: "center", color: C.yellow, fontSize: 13 }}>
          BLE not available — run on Android via Capacitor to enable device connections
        </div>
      )}
      <div style={sCard}>
        <div style={{ color: C.accent, fontSize: 15, fontWeight: 700, marginBottom: 8 }}>Devices</div>
        <DevBtn type="dopeCard" label="TM22 DOPE Card" icon="📡" />
        <DevBtn type="calypso" label="Calypso Wind" icon="🌬" />
        <DevBtn type="kestrel" label="Kestrel 5700" icon="🌡" />
        <DevBtn type="sigKilo" label="Sig Kilo 3K" icon="🎯" />
        {status && <div style={{ color: C.dim, fontSize: 11, marginTop: 6, textAlign: "center" }}>{status}</div>}
      </div>
      {weather.temp !== null && (
        <div style={sCard}>
          <div style={{ color: C.accent, fontSize: 13, fontWeight: 700, marginBottom: 6 }}>Live Weather ({weather.source})</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4, fontSize: 12, color: C.dim }}>
            {weather.temp !== null && <div>Temp: <span style={{ color: C.text }}>{weather.temp.toFixed(1)}°F</span></div>}
            {weather.pressure !== null && <div>Baro: <span style={{ color: C.text }}>{weather.pressure.toFixed(2)}"</span></div>}
            {weather.humidity !== null && <div>Hum: <span style={{ color: C.text }}>{weather.humidity.toFixed(0)}%</span></div>}
            {weather.windSpeed !== null && <div>Wind: <span style={{ color: C.text }}>{weather.windSpeed.toFixed(1)} mph</span></div>}
            {weather.windDir !== null && <div>Dir: <span style={{ color: C.text }}>{weather.windDir.toFixed(0)}°</span></div>}
          </div>
        </div>
      )}
    </div>
  );
}


// ============================================================================
// BALLISTIC ENGINE — TM22 Reference Curve + G1 Fallback
// ============================================================================
const STD_SPEED_OF_SOUND = 1116.4;
const GRAVITY_IPSQ = 386.4;
const DRAG_C_STD = (0.5 * 0.002378 * Math.PI * 32.174) / (4 * 144);

const G1_TABLE = [
  [0,0.2629],[0.05,0.2558],[0.1,0.2487],[0.15,0.2413],[0.2,0.2344],[0.25,0.2278],
  [0.3,0.2214],[0.35,0.2155],[0.4,0.2104],[0.45,0.2061],[0.5,0.2032],[0.55,0.202],
  [0.6,0.2034],[0.65,0.2165],[0.7,0.223],[0.725,0.2313],[0.75,0.2417],[0.775,0.2546],
  [0.8,0.2706],[0.825,0.2901],[0.85,0.3136],[0.875,0.3415],[0.9,0.3734],[0.925,0.4084],
  [0.95,0.4448],[0.975,0.4805],[1,0.5067],[1.025,0.5191],[1.05,0.52],[1.075,0.515],
  [1.1,0.5063],[1.125,0.495],[1.15,0.483],[1.2,0.459],[1.25,0.437],[1.3,0.418],
  [1.35,0.401],[1.4,0.386],[1.45,0.373],[1.5,0.361],[1.55,0.35],[1.6,0.34],
];

// TM22 Reference Drag Curve — 22LR round-nose heeled bullet
// Empirical core (Mach 0.735–0.838): CZD + SK Std+ field data, Sessions 1–3
// Short-range scaffolding (>0.838): G7-shape × TM22/G7 ratio (0.549 avg)
// Long-range scaffolding (<0.735): G1-shape extrapolation
// Solver finds BC ~0.10-0.13 (near real) vs G1's 0.43-0.56 (inflated 3-4×)
// Solver noise reduced 77% vs G1 at short range
const TM22_TABLE = [
  // === TM22 v2 — AB Doppler lab curve (SK Match), polynomial-smoothed ===
  // Field-validated against 6 empirical points (SK Rifle Match, Sessions 1-3)
  // Mach 0.625–0.875: AB lab data via degree-5 polynomial fit to velocity profile
  // Edges: G7-shape scaffolding (bullet rarely visits these Mach ranges in competition)
  [0.500, 0.0638],  // Scaffolding
  [0.550, 0.0638],  // Scaffolding
  [0.600, 0.0638],  // Scaffolding
  [0.625, 0.0647],  // AB Lab
  [0.650, 0.0656],  // AB Lab
  [0.675, 0.0662],  // AB Lab
  [0.700, 0.0664],  // AB Lab
  [0.725, 0.0665],  // AB Lab
  [0.750, 0.0668],  // AB Lab
  [0.775, 0.0672],  // AB Lab
  [0.800, 0.0682],  // AB Lab
  [0.825, 0.0696],  // AB Lab
  [0.850, 0.0716],  // AB Lab
  [0.875, 0.0743],  // AB Lab
  [0.900, 0.0829],  // Scaffolding (transition)
  [0.925, 0.0940],  // Scaffolding
  [0.950, 0.1169],  // Scaffolding
  [0.975, 0.1713],  // Scaffolding
  [1.000, 0.2188],  // Scaffolding
];

function lookupCd(table, mach) {
  if (mach <= table[0][0]) return table[0][1];
  if (mach >= table[table.length - 1][0]) return table[table.length - 1][1];
  for (let i = 0; i < table.length - 1; i++) {
    if (mach >= table[i][0] && mach <= table[i + 1][0]) {
      const f = (mach - table[i][0]) / (table[i + 1][0] - table[i][0]);
      return table[i][1] + f * (table[i + 1][1] - table[i][1]);
    }
  }
  return table[0][1];
}

function calculateDrop(params, cdTable = G1_TABLE) {
  const { distance, muzzleVelocity, bc, zeroRange, scopeHeight,
    temperature = 59, densityAltitude = 0, mvActual = false } = params;
  const getCd = (m) => lookupCd(cdTable, m);
  const adjustedMV = mvActual ? muzzleVelocity : muzzleVelocity + (temperature - 59) * 0.8;
  const rhoRatio = Math.pow(1 - densityAltitude / 145442, 4.256);
  const Cf = DRAG_C_STD * rhoRatio;
  const sos = STD_SPEED_OF_SOUND * Math.sqrt((temperature + 459.67) / 518.67);
  const dx = 0.5;
  const maxFeet = Math.max(distance, zeroRange) * 3 + 3;
  let v = adjustedMV, t = 0, distFt = 0;
  let zeroGDrop = 0, targGDrop = 0, targV = adjustedMV, targT = 0;
  let gotZero = false, gotTarget = false;
  while (distFt <= maxFeet) {
    const yds = distFt / 3;
    if (!gotZero && yds >= zeroRange - 0.17) { zeroGDrop = 0.5 * GRAVITY_IPSQ * t * t; gotZero = true; }
    if (!gotTarget && yds >= distance - 0.17) { targV = v; targT = t; targGDrop = 0.5 * GRAVITY_IPSQ * t * t; gotTarget = true; }
    if (gotZero && gotTarget) break;
    const mach = v / sos;
    v += (-Cf * getCd(mach) * v / bc) * dx;
    if (v < 50) v = 50;
    t += dx / v;
    distFt += dx;
  }
  const scopeAngle = Math.atan((zeroGDrop + scopeHeight) / (zeroRange * 36));
  const boreLineHeight = Math.tan(scopeAngle) * (distance * 36);
  const corrInches = targGDrop + scopeHeight - boreLineHeight;
  const dropMils = (corrInches / (distance * 36)) * 1000;
  const dropMOA = (corrInches / distance) * 95.5;
  return { dropMils, dropMOA, dropInches: corrInches, velocity: targV, mach: targV / sos, tof: targT, adjustedMV };
}

function calcVelocityAtDist(distance, mv, bc, cdTable = G1_TABLE, temperature = 59, densityAltitude = 0, mvActual = false) {
  const getCd = (m) => lookupCd(cdTable, m);
  const adjustedMV = mvActual ? mv : mv + (temperature - 59) * 0.8;
  const rhoRatio = Math.pow(1 - densityAltitude / 145442, 4.256);
  const Cf = DRAG_C_STD * rhoRatio;
  const sos = STD_SPEED_OF_SOUND * Math.sqrt((temperature + 459.67) / 518.67);
  const dx = 0.5; let v = adjustedMV, distFt = 0;
  while (distFt < distance * 3) {
    v += (-Cf * getCd(v / sos) * v / bc) * dx;
    if (v < 50) v = 50; distFt += dx;
  }
  return v;
}

function solveBcFromDialUp(dialUpMils, distance, zeroRange, scopeHeight, mv, temp, da, cdTable = G1_TABLE) {
  if (dialUpMils <= 0) return { bc: 0.135, clamped: "negative" };
  let lo = 0.01, hi = cdTable === TM22_TABLE ? 0.5 : 0.8;
  const hiCheck = calculateDrop({ distance, muzzleVelocity: mv, bc: hi, zeroRange, scopeHeight, temperature: temp, densityAltitude: da }, cdTable);
  const loCheck = calculateDrop({ distance, muzzleVelocity: mv, bc: lo, zeroRange, scopeHeight, temperature: temp, densityAltitude: da }, cdTable);
  if (dialUpMils < hiCheck.dropMils) return { bc: hi, clamped: "high", expected: hiCheck.dropMils };
  if (dialUpMils > loCheck.dropMils) return { bc: lo, clamped: "low", expected: loCheck.dropMils };
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const r = calculateDrop({ distance, muzzleVelocity: mv, bc: mid, zeroRange, scopeHeight, temperature: temp, densityAltitude: da }, cdTable);
    if (Math.abs(r.dropMils - dialUpMils) < 0.003) return { bc: mid };
    if (r.dropMils < dialUpMils) hi = mid; else lo = mid;
  }
  return { bc: (lo + hi) / 2 };
}

// ============================================================================
// STEPPED BC — Interpolated flat BC by distance (legacy engine)
// ============================================================================
function lookupSteppedBc(distance, table) {
  if (!table || table.length === 0) return null;
  const sorted = [...table].sort((a, b) => a.distance - b.distance);
  const d = parseFloat(distance);
  if (d <= sorted[0].distance) return sorted[0].bc;
  if (d >= sorted[sorted.length - 1].distance) return sorted[sorted.length - 1].bc;
  for (let i = 0; i < sorted.length - 1; i++) {
    if (d >= sorted[i].distance && d <= sorted[i + 1].distance) {
      const r = (d - sorted[i].distance) / (sorted[i + 1].distance - sorted[i].distance);
      return sorted[i].bc + r * (sorted[i + 1].bc - sorted[i].bc);
    }
  }
  return sorted[0].bc;
}

// ============================================================================
// SINGLE TM22 BC SOLVER — One BC fits all points across all conditions
// Golden section search minimizing total squared error against TM22 curve
// Each point evaluated under ITS OWN conditions (temp, DA, MV)
// ============================================================================
function solveSingleTM22Bc(points) {
  if (!points || points.length === 0) return null;
  // Build evaluation list from truing points that have full condition snapshots
  const evalPts = points.filter(p => p.conditions && p.corrMils > 0 && p.distance > 0).map(p => ({
    dist: p.distance,
    dial: p.corrMils,
    mv: p.conditions.mv || p.conditions.profileMV || 1056,
    // If chrono'd (mv !== profileMV), disable temp comp by using temp=59
    temp: (p.conditions.mv && p.conditions.profileMV && Math.abs(p.conditions.mv - p.conditions.profileMV) > 3) ? 59 : (p.conditions.temp || 59),
    da: p.conditions.da || 0,
    zero: p.conditions.zeroDistance || 50,
    sh: p.conditions.scopeHeight || 2.6,
    lowConf: p.lowConf
  }));
  if (evalPts.length === 0) return null;
  // Weight: high-conf points count full, low-conf half
  const cost = (bc) => {
    let sum = 0;
    for (const p of evalPts) {
      const r = calculateDrop({
        distance: p.dist, muzzleVelocity: p.mv, bc,
        zeroRange: p.zero, scopeHeight: p.sh,
        temperature: p.temp, densityAltitude: p.da
      }, TM22_TABLE);
      const w = p.lowConf ? 0.5 : 1.0;
      sum += w * (r.dropMils - p.dial) ** 2;
    }
    return sum;
  };
  // Golden section search
  let lo = 0.01, hi = 0.15;
  for (let i = 0; i < 80; i++) {
    const m1 = lo + (hi - lo) * 0.382, m2 = lo + (hi - lo) * 0.618;
    if (cost(m1) < cost(m2)) hi = m2; else lo = m1;
  }
  const bc = (lo + hi) / 2;
  // Compute residuals for display
  let sumErr = 0, maxErr = 0;
  const resid = evalPts.map(p => {
    const r = calculateDrop({
      distance: p.dist, muzzleVelocity: p.mv, bc,
      zeroRange: p.zero, scopeHeight: p.sh,
      temperature: p.temp, densityAltitude: p.da
    }, TM22_TABLE);
    const err = r.dropMils - p.dial;
    sumErr += Math.abs(err); if (Math.abs(err) > maxErr) maxErr = Math.abs(err);
    return { dist: p.dist, predicted: r.dropMils, actual: p.dial, error: err };
  });
  return {
    bc,
    avgError: sumErr / evalPts.length,
    maxError: maxErr,
    numPoints: evalPts.length,
    residuals: resid
  };
}

// ============================================================================
// SPIN DRIFT — Miller formula + scope cant effect
// ============================================================================
// Miller spin drift: Sd = 1.25 * (SG + 1.2) * TOF^1.83
// SG (gyroscopic stability) = (30 * m) / (t^2 * d^3 * l * (1 + l^2))
//   m = bullet mass (grains), t = twist (calibers/turn), d = bullet dia (in)
//   l = bullet length / bullet diameter
// For 22LR: d=0.224", typical 40gr bullet length ~0.43"
function calcSpinDrift(tof, twistRateInches, bulletWeightGr, bulletDiameter = 0.224, bulletLength = 0.43) {
  if (!tof || tof <= 0 || !twistRateInches || twistRateInches <= 0) return { driftInches: 0, driftMils: 0, sg: 0 };
  const d = bulletDiameter;
  const l = bulletLength / d; // length in calibers
  const t = twistRateInches / d; // twist in calibers per turn
  const m = bulletWeightGr;
  // Greenhill-Miller stability factor
  const sg = (30 * m) / (Math.pow(t, 2) * Math.pow(d, 3) * l * (1 + Math.pow(l, 2)));
  // Miller spin drift formula (inches, positive = right for right-hand twist)
  const sd = 1.25 * (sg + 1.2) * Math.pow(tof, 1.83);
  return { driftInches: sd, sg };
}

function calcSpinDriftAtDist(distance, tof, twistRateInches, bulletWeightGr, twistDirection = "R", bulletDiameter = 0.224, bulletLength = 0.43) {
  const { driftInches, sg } = calcSpinDrift(tof, twistRateInches, bulletWeightGr, bulletDiameter, bulletLength);
  const sign = twistDirection === "R" ? 1 : -1;
  const dMils = distance > 0 ? (driftInches / (distance * 36)) * 1000 * sign : 0;
  const dMOA = distance > 0 ? (driftInches / distance) * 95.5 * sign : 0;
  return { driftInches: driftInches * sign, driftMils: dMils, driftMOA: dMOA, sg };
}

// Scope cant effect: when scope is canted by angle θ, elevation dial-up creates horizontal shift
// Horizontal shift = elevation (MIL) * sin(cant_angle_rad)
// Vertical loss = elevation * (1 - cos(cant_angle_rad))  [negligible for small angles]
function calcCantEffect(elevationMils, cantAngleDeg) {
  if (!elevationMils || !cantAngleDeg) return { horizontalMils: 0, verticalLossMils: 0 };
  const cantRad = cantAngleDeg * Math.PI / 180;
  return {
    horizontalMils: elevationMils * Math.sin(cantRad),
    verticalLossMils: elevationMils * (1 - Math.cos(cantRad))
  };
}

// ============================================================================
// CONFIDENCE ZONE — classify distance reliability
// ============================================================================
function getConfZone(dist, zeroRange = 50) {
  const minTrue = zeroRange * 2.5;
  if (dist < minTrue) return { zone: "SHORT", color: "#eab308", label: "Low Conf", tip: "Solver noisy below " + minTrue + "yd" };
  if (dist <= 130) return { zone: "SHORT-MID", color: "#f59e0b", label: "Fair", tip: "Transition zone" };
  if (dist <= 250) return { zone: "MID", color: "#22c55e", label: "High Conf", tip: "Sweet spot — best accuracy" };
  if (dist <= 302) return { zone: "LONG", color: "#3b82f6", label: "Good", tip: "Validated to 302yd" };
  return { zone: "EXTRAP", color: "#ef4444", label: "Extrapolated", tip: "Beyond validated range" };
}

// ============================================================================
// TM22 Display — Mach-indexed factor view
// ============================================================================
function normalizeGroupMOA(grpSize, grpUnit, distance) {
  const g = parseFloat(grpSize) || 0;
  if (g <= 0) return 0;
  if (grpUnit === "MIL") return g * 3.438;
  if (grpUnit === "IN") return distance > 0 ? (g / distance) * 95.5 : 0;
  return g;
}

function buildTM22Display(points, baseBc) {
  if (!points || points.length === 0 || !baseBc || baseBc <= 0) return null;
  const raw = points
    .filter(p => p.bc > 0 && p.mach > 0)
    .map(p => {
      const factor = p.factor || (p.bc / baseBc);
      const shots = p.shots || 5;
      const grpMOA = normalizeGroupMOA(p.grpSize, p.grpUnit, p.distance) || 3;
      const weight = Math.sqrt(shots) / Math.max(grpMOA, 0.3);
      return { mach: p.mach, factor, weight, lowConf: p.lowConf || false };
    });
  if (raw.length === 0) return null;
  const MACH_BAND = 0.015;
  raw.sort((a, b) => b.mach - a.mach);
  const merged = [];
  let i = 0;
  while (i < raw.length) {
    let sumF = raw[i].factor * raw[i].weight, sumW = raw[i].weight;
    let sumM = raw[i].mach * raw[i].weight, count = 1, anyLow = raw[i].lowConf;
    let j = i + 1;
    while (j < raw.length && raw[i].mach - raw[j].mach <= MACH_BAND) {
      sumF += raw[j].factor * raw[j].weight; sumW += raw[j].weight;
      sumM += raw[j].mach * raw[j].weight; count++;
      if (raw[j].lowConf) anyLow = true; j++;
    }
    merged.push({ mach: sumM / sumW, factor: sumF / sumW, weight: sumW, count, lowConf: anyLow });
    i = j;
  }
  return merged;
}

// ============================================================================
// CLOCK/DIRECTION HELPERS
// ============================================================================
function fmtClock(v) {
  if (v === "" || v === undefined || v === null) return "";
  const s = String(v);
  if (s.includes(":")) return s;
  const n = parseFloat(s);
  if (isNaN(n)) return s;
  const h = Math.floor(n);
  const m = Math.round((n - h) * 60);
  return `${h}:${m.toString().padStart(2, "0")}`;
}
function parseClock(s) {
  if (!s) return 0;
  const str = String(s);
  if (str.includes(":")) { const [h, m] = str.split(":"); return (parseFloat(h) || 0) + (parseFloat(m) || 0) / 60; }
  return parseFloat(str) || 0;
}
